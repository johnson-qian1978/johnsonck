<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMD 管理 - 武汉医疗互助</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #f5f7fa;
    }
    
    .container {
      display: flex;
      min-height: 100vh;
    }
    
    /* 左侧导航 */
    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #001529 0%, #002140 100%);
      color: #fff;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }
    
    .logo {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: #ff6b00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    
    .logo-text {
      font-size: 16px;
      font-weight: bold;
    }
    
    .menu-item {
      padding: 15px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      color: rgba(255,255,255,0.65);
    }
    
    .menu-item:hover {
      color: #fff;
      background: rgba(255,255,255,0.08);
    }
    
    .menu-item.active {
      background: #1890ff;
      color: #fff;
    }
    
    .menu-item .icon {
      width: 16px;
      text-align: center;
    }
    
    /* 主内容区 */
    .main-content {
      flex: 1;
      margin-left: 240px;
      padding: 20px;
    }
    
    /* 顶部信息栏 */
    .header-info {
      background: #fff;
      padding: 15px 20px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    
    .breadcrumb {
      color: #666;
      font-size: 14px;
    }
    
    .current-period {
      color: #999;
      font-size: 13px;
    }
    
    /* 内容卡片 */
    .content-card {
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    
    /* 搜索区域 */
    .search-area {
      padding: 20px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .search-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .search-label {
      font-size: 14px;
      color: #333;
      white-space: nowrap;
    }
    
    /* 表格区域 */
    .table-toolbar {
      padding: 15px 20px;
    }
    
    .add-btn {
      background: #1890ff;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
    }
    
    .add-btn:hover {
      background: #40a9ff;
    }
    
    .data-table {
      width: 100%;
    }
    
    .data-table th {
      background: #fafafa;
      color: #333;
      font-weight: 500;
      padding: 12px 8px;
      text-align: center;
      border-bottom: 1px solid #e8e8e8;
    }
    
    .data-table td {
      padding: 12px 8px;
      text-align: center;
      border-bottom: 1px solid #e8e8e8;
      color: #666;
    }
    
    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #1890ff;
      font-size: 13px;
      margin: 0 5px;
    }
    
    .action-btn:hover {
      text-decoration: underline;
    }
    
    .action-btn.delete {
      color: #ff4d4f;
    }
    
    /* 分页 */
    .pagination {
      padding: 15px 20px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 15px;
    }
    
    .page-info {
      font-size: 13px;
      color: #999;
    }
    
    .page-controls {
      display: flex;
      gap: 5px;
    }
    
    .page-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #d9d9d9;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    
    .page-btn.active {
      border-color: #1890ff;
      color: #1890ff;
    }
    
    .page-btn:disabled {
      background: #f5f5f5;
      color: #ccc;
      cursor: not-allowed;
    }
    
    .page-ellipsis {
      display: flex;
      align-items: center;
      padding: 0 8px;
      color: #999;
      font-size: 14px;
    }
    
    .page-size-select {
      padding: 5px 10px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
    }
    
    /* 弹窗 */
    .dialog-header {
      font-size: 16px;
      font-weight: 500;
      color: #333;
    }
    
    .form-item {
      margin-bottom: 20px;
    }
    
    .form-label {
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
      display: block;
    }
    
    .required::before {
      content: '*';
      color: #ff4d4f;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <!-- 左侧导航 -->
      <div class="sidebar">
        <div class="logo">
          <div class="logo-icon">医</div>
          <div class="logo-text">武汉医疗互助</div>
        </div>
        
        <div class="menu-item">
          <span class="icon">🏠</span>
          <span>系统首页</span>
        </div>
        
        <div class="menu-item">
          <span class="icon">📢</span>
          <span>通知公告</span>
        </div>
        
        <div class="menu-item active">
          <span class="icon"></span>
          <span>单位管理</span>
        </div>
        
        <div style="padding-left: 20px;">
          <div class="menu-item active" style="background: #13c2c2;">
            <span>BMD 管理</span>
          </div>
        </div>
      </div>
      
      <!-- 主内容区 -->
      <div class="main-content">
        <!-- 顶部信息 -->
        <div class="header-info">
          <div class="breadcrumb">
            / 单位管理 / BMD 管理
          </div>
          <div class="current-period">
            当期（2026 年度）住院为第 15 期，综合为第 13 期，重疾为第 12 期
          </div>
        </div>
        
        <!-- 内容卡片 -->
        <div class="content-card">
          <!-- 搜索区域 -->
          <div class="search-area">
            <div class="search-item">
              <span class="search-label">单位名称:</span>
              <el-input v-model="searchForm.name" placeholder="请输入单位名称" style="width: 200px;"></el-input>
            </div>
            
            <div class="search-item">
              <span class="search-label">类型:</span>
              <el-select v-model="searchForm.type" placeholder="请选择类型" clearable style="width: 250px;">
                <el-option label="单位名称" :value="1"></el-option>
                <el-option label="身份证号" :value="2"></el-option>
                <el-option label="超过退休年龄人员" :value="3"></el-option>
                <el-option label="不同单位退休人员" :value="4"></el-option>
              </el-select>
            </div>
            
            <div style="flex: 1;"></div>
            
            <el-button type="primary" @click="handleSearch">查 询</el-button>
            <el-button @click="handleReset">重 置</el-button>
          </div>
          
          <!-- 表格工具栏 -->
          <div class="table-toolbar">
            <button class="add-btn" @click="handleAdd">
              <span>⊕</span> 新增
            </button>
          </div>
          
          <!-- 数据表格 -->
          <table class="data-table">
            <thead>
              <tr>
                <th width="80">序号</th>
                <th>ID</th>
                <th>名称</th>
                <th>类型</th>
                <th>备用字段</th>
                <th width="150">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="(item, index) in paginatedData" :key="item.ID">
                <td>{{ (currentPage - 1) * pageSize + index + 1 }}</td>
                <td>{{ item.ID }}</td>
                <td>{{ item.NAME }}</td>
                <td>{{ getTypeLabel(item.TYPE) }}</td>
                <td>{{ item.BAK || '-' }}</td>
                <td>
                  <button class="action-btn" @click="handleEdit(item)">编辑</button>
                  <button class="action-btn delete" @click="handleDelete(item)">删除</button>
                </td>
              </tr>
              <tr v-if="tableData.length === 0">
                <td colspan="6" style="padding: 40px; color: #999;">暂无数据</td>
              </tr>
            </tbody>
          </table>
          
          <!-- 分页 -->
          <div class="pagination" v-if="total > 0">
            <div class="page-info">共有 {{ total }} 条数据</div>
            <div class="page-controls">
              <button class="page-btn" @click="prevPage" :disabled="currentPage === 1">
                <span style="font-size: 12px;">❮</span>
              </button>
              
              <button 
                v-for="pageNum in displayPages" 
                :key="pageNum"
                class="page-btn" 
                :class="{ active: currentPage === pageNum }"
                @click="goToPage(pageNum)"
                style="min-width: 32px;"
              >{{ pageNum }}</button>
              
              <button class="page-btn" @click="nextPage" :disabled="currentPage === totalPages">
                <span style="font-size: 12px;">❯</span>
              </button>
            </div>
            <select class="page-size-select" v-model="pageSize" @change="handlePageSizeChange">
              <option value="10">10 条/页</option>
              <option value="20">20 条/页</option>
              <option value="50">50 条/页</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 新增/编辑弹窗 -->
    <el-dialog 
      v-model="dialogVisible" 
      :title="isEdit ? '编辑 BMD' : '新增 BMD'"
      width="500px"
    >
      <div class="form-item">
        <label class="form-label required">ID</label>
        <el-input 
          v-model="formData.ID" 
          :disabled="true" 
          placeholder="自动生成"
          style="background: #f5f7fa;"
        ></el-input>
        <div style="font-size: 12px; color: #999; margin-top: 4px;">ID 将自动生成，无需手动输入</div>
      </div>
      
      <div class="form-item">
        <label class="form-label required">名称</label>
        <el-input v-model="formData.NAME" placeholder="请输入名称"></el-input>
      </div>
      
      <div class="form-item">
        <label class="form-label required">类型</label>
        <el-select v-model="formData.TYPE" placeholder="请选择类型" style="width: 100%;">
          <el-option label="单位名称" :value="1"></el-option>
          <el-option label="身份证号" :value="2"></el-option>
          <el-option label="超过退休年龄人员" :value="3"></el-option>
          <el-option label="不同单位退休人员" :value="4"></el-option>
        </el-select>
      </div>
      
      <div class="form-item">
        <label class="form-label">备用字段</label>
        <el-input v-model="formData.BAK" placeholder="请输入备用字段"></el-input>
      </div>
      
      <template #footer>
        <el-button @click="dialogVisible = false">取 消</el-button>
        <el-button type="primary" @click="handleSubmit">确 定</el-button>
      </template>
    </el-dialog>
  </div>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  
  <script>
    const { createApp, ref, computed, onMounted } = Vue;
    
    const app = createApp({
      setup() {
        const allData = ref([]); // 所有原始数据
        const tableData = computed(() => {
          // 根据搜索条件过滤数据
          return allData.value.filter(item => {
            const matchName = !searchForm.value.name || item.NAME.includes(searchForm.value.name);
            const matchType = !searchForm.value.type || item.TYPE === searchForm.value.type;
            return matchName && matchType;
          });
        });
        const searchForm = ref({
          name: '',
          type: ''
        });
        
        const dialogVisible = ref(false);
        const isEdit = ref(false);
        const formData = ref({
          id: '',
          name: '',
          type: 1,
          bak: ''
        });
        
        const currentPage = ref(1);
        const pageSize = ref(10);
        
        const total = computed(() => tableData.value.length);
        const totalPages = computed(() => {
          const pages = Math.ceil(total.value / pageSize.value);
          return pages > 0 ? pages : 1; // 至少显示 1 页
        });
        
        // 调试用
        console.log('初始化：total=', total.value, 'totalPages=', totalPages.value);
        
        const paginatedData = computed(() => {
          const start = (currentPage.value - 1) * pageSize.value;
          const end = start + pageSize.value;
          const data = tableData.value.slice(start, end);
          return data;
        });
        
        // 获取类型标签
        const getTypeLabel = (type) => {
          const types = {
            1: '单位名称',
            2: '身份证号',
            3: '超过退休年龄人员',
            4: '不同单位退休人员'
          };
          return types[type] || '未知';
        };
        
        // 加载数据
        const loadData = async () => {
          try {
            const response = await axios.get('/api/bmd');
            if (response.data.success) {
              allData.value = response.data.data;
            }
          } catch (err) {
            ElementPlus.ElMessage.error('加载数据失败：' + err.message);
          }
        };
        
        // 搜索
        const handleSearch = () => {
          currentPage.value = 1; // 重置到第一页
          // 数据已经通过 computed 自动过滤
        };
        
        // 重置
        const handleReset = () => {
          searchForm.value = { name: '', type: '' };
          currentPage.value = 1;
          // 数据已经通过 computed 自动过滤
        };
        
        // 生成 UUID
        const generateUUID = () => {
          return 'xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'.replace(/[x]/g, () => {
            const r = Math.random() * 16 | 0;
            return r.toString(16).toUpperCase();
          });
        };
        
        // 新增
        const handleAdd = () => {
          isEdit.value = false;
          formData.value = { 
            ID: generateUUID(), // 自动生成 UUID
            NAME: '', 
            TYPE: 1, 
            BAK: '' 
          };
          dialogVisible.value = true;
        };
        
        // 编辑
        const handleEdit = (row) => {
          isEdit.value = true;
          formData.value = { 
            ID: row.ID, 
            NAME: row.NAME, 
            TYPE: row.TYPE, 
            BAK: row.BAK 
          };
          dialogVisible.value = true;
        };
        
        // 删除
        const handleDelete = async (row) => {
          try {
            await ElementPlus.ElMessageBox.confirm('确定要删除这条记录吗？', '提示', {
              confirmButtonText: '确定',
              cancelButtonText: '取消',
              type: 'warning'
            });
            
            const response = await axios.delete(`/api/bmd/${row.ID}`);
            if (response.data.success) {
              ElementPlus.ElMessage.success('删除成功');
              loadData();
            }
          } catch (err) {
            if (err !== 'cancel') {
              ElementPlus.ElMessage.error('删除失败：' + err.message);
            }
          }
        };
        
        // 提交
        const handleSubmit = async () => {
          if (!formData.value.ID || !formData.value.NAME || !formData.value.TYPE) {
            ElementPlus.ElMessage.warning('请填写必填项');
            return;
          }
          
          try {
            let response;
            if (isEdit.value) {
              response = await axios.put(`/api/bmd/${formData.value.ID}`, {
                id: formData.value.ID,
                name: formData.value.NAME,
                type: formData.value.TYPE,
                bak: formData.value.BAK
              });
            } else {
              response = await axios.post('/api/bmd', {
                id: formData.value.ID,
                name: formData.value.NAME,
                type: formData.value.TYPE,
                bak: formData.value.BAK
              });
            }
            
            if (response.data.success) {
              ElementPlus.ElMessage.success(isEdit.value ? '更新成功' : '添加成功');
              dialogVisible.value = false;
              loadData();
            }
          } catch (err) {
            ElementPlus.ElMessage.error('操作失败：' + err.message);
          }
        };
        
        // 分页
        const prevPage = () => {
          if (currentPage.value > 1) {
            currentPage.value--;
          }
        };
        
        const nextPage = () => {
          if (currentPage.value < totalPages.value) {
            currentPage.value++;
          }
        };
        
        const handlePageSizeChange = () => {
          currentPage.value = 1;
        };
        
        // 跳转到指定页
        const goToPage = (page) => {
          if (page >= 1 && page <= totalPages.value) {
            currentPage.value = page;
          }
        };
        
        // 显示的分页页码
        const displayPages = computed(() => {
          const pages = [];
          const total = totalPages.value;
          const current = currentPage.value;
          
          console.log('[分页] total=', total, 'current=', current, 'pageSize=', pageSize.value);
          console.log('[分页] tableData length=', tableData.value.length, 'allData length=', allData.value.length);
          
          // 简单逻辑：始终显示 9 个页码（当前页居中）
          let start = Math.max(1, current - 4);
          let end = Math.min(total, start + 8);
          
          // 重新调整起始页，确保显示 9 个
          if (end - start < 8) {
            start = Math.max(1, end - 8);
          }
          
          for (let i = start; i <= end; i++) {
            pages.push(i);
          }
          
          console.log('[分页] 显示页码:', pages);
          return pages;
        });
        
        onMounted(() => {
          loadData();
        });
        
        return {
          tableData,
          searchForm,
          dialogVisible,
          isEdit,
          formData,
          currentPage,
          pageSize,
          total,
          totalPages,
          paginatedData,
          displayPages,
          goToPage,
          getTypeLabel,
          handleSearch,
          handleReset,
          handleAdd,
          handleEdit,
          handleDelete,
          handleSubmit,
          prevPage,
          nextPage,
          handlePageSizeChange
        };
      }
    });
    
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
