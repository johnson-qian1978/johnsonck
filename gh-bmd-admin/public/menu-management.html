<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜单管理 - 武汉医疗互助</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f7fa; }
    .container { display: flex; min-height: 100vh; }
    
    /* 左侧导航 */
    .sidebar {
      width: 240px; background: linear-gradient(180deg, #001529 0%, #002140 100%);
      color: #fff; position: fixed; height: 100vh; overflow-y: auto;
    }
    .logo {
      padding: 20px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo-icon {
      width: 32px; height: 32px; background: #ff6b00; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-weight: bold;
    }
    .logo-text { font-size: 16px; font-weight: bold; }
    .menu-item {
      padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
      transition: all 0.3s; color: rgba(255,255,255,0.65);
    }
    .menu-item:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .menu-item.active { background: #1890ff; color: #fff; }
    .submenu-item {
      padding: 12px 20px 12px 50px; cursor: pointer;
      color: rgba(255,255,255,0.65); transition: all 0.3s;
    }
    .submenu-item:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .submenu-item.active { background: #13c2c2; color: #fff; }
    
    /* 主内容区 */
    .main-content { flex: 1; margin-left: 240px; padding: 20px; }
    .header-info {
      background: #fff; padding: 15px 20px; border-radius: 4px; margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .breadcrumb { color: #666; font-size: 14px; }
    .current-period { color: #999; font-size: 13px; }
    .content-card {
      background: #fff; border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    
    /* 菜单管理布局 */
    .menu-management { display: flex; gap: 20px; padding: 20px; }
    
    /* 左侧树形菜单 */
    .menu-tree-panel {
      width: 320px; background: #fafafa; border-radius: 4px;
      padding: 15px; border: 1px solid #e8e8e8;
    }
    .panel-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #e8e8e8;
    }
    .panel-title { font-size: 16px; font-weight: 500; color: #333; }
    .add-btn {
      background: #1890ff; color: #fff; border: none; padding: 6px 12px;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .add-btn:hover { background: #40a9ff; }
    
    /* 树形控件自定义 */
    .el-tree { background: transparent; }
    .el-tree-node__label { flex: 1; }
    .tree-node-actions { display: flex; gap: 5px; opacity: 0; transition: opacity 0.3s; }
    .el-tree-node:hover .tree-node-actions { opacity: 1; }
    .action-icon-btn {
      background: none; border: none; cursor: pointer;
      color: #1890ff; font-size: 12px; padding: 2px;
    }
    .action-icon-btn:hover { text-decoration: underline; }
    .action-icon-btn.delete { color: #ff4d4f; }
    
    /* 右侧详情表单 */
    .menu-detail-panel {
      flex: 1; background: #fff; border-radius: 4px;
      padding: 20px; border: 1px solid #e8e8e8;
    }
    .form-section { margin-bottom: 25px; }
    .section-title {
      font-size: 15px; font-weight: 500; color: #333;
      margin-bottom: 15px; padding-bottom: 8px;
      border-bottom: 2px solid #1890ff; display: inline-block;
    }
    .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
    .form-item { flex: 1; }
    .form-label {
      font-size: 14px; color: #333; margin-bottom: 8px; display: block;
    }
    .required::before { content: '*'; color: #ff4d4f; margin-right: 4px; }
    
    /* 按钮管理表格 */
    .button-table { margin-top: 15px; }
    .button-table th {
      background: #fafafa; color: #333; font-weight: 500;
      padding: 12px 8px; text-align: left; border-bottom: 1px solid #e8e8e8;
    }
    .button-table td {
      padding: 12px 8px; border-bottom: 1px solid #e8e8e8; color: #666;
    }
    .button-input-row td { padding: 8px; }
    .inline-input { width: 100%; padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 4px; }
    .table-action-btn {
      background: none; border: none; cursor: pointer;
      color: #1890ff; font-size: 13px; margin-right: 8px;
    }
    .table-action-btn:hover { text-decoration: underline; }
    .table-action-btn.delete { color: #ff4d4f; }
    .add-button-row {
      background: #fafafa; padding: 15px; text-align: center;
      border: 2px dashed #1890ff; border-radius: 4px; margin-top: 15px;
      cursor: pointer; color: #1890ff; font-size: 14px;
    }
    .add-button-row:hover { background: #e6f7ff; }
    
    /* 图标选择器 */
    .icon-selector { display: flex; gap: 10px; align-items: center; }
    .icon-preview {
      width: 40px; height: 40px; border: 1px solid #d9d9d9;
      border-radius: 4px; display: flex; align-items: center;
      justify-content: center; font-size: 20px; background: #fff;
    }
    .icon-grid {
      display: grid; grid-template-columns: repeat(8, 1fr);
      gap: 8px; max-height: 300px; overflow-y: auto;
      padding: 15px; background: #fafafa; border-radius: 4px;
      margin-top: 10px;
    }
    .icon-item {
      width: 40px; height: 40px; border: 1px solid #e8e8e8;
      border-radius: 4px; display: flex; align-items: center;
      justify-content: center; font-size: 18px; cursor: pointer;
      background: #fff; transition: all 0.3s;
    }
    .icon-item:hover { border-color: #1890ff; transform: scale(1.1); }
    .icon-item.selected { border-color: #1890ff; background: #e6f7ff; }
    
    /* 空状态 */
    .empty-state {
      text-align: center; padding: 60px 20px; color: #999;
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 15px; }
    .empty-state-text { font-size: 14px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <!-- 左侧导航 -->
      <div class="sidebar">
        <div class="logo">
          <div class="logo-icon">医</div>
          <div class="logo-text">武汉医疗互助</div>
        </div>
        
        <div class="menu-item">
          <span>🏠</span><span>系统首页</span>
        </div>
        <div class="menu-item">
          <span>📢</span><span>通知公告</span>
        </div>
        <div class="menu-item active">
          <span>⚙️</span><span>系统管理</span>
        </div>
        <div class="submenu-item active">菜单管理</div>
      </div>
      
      <!-- 主内容区 -->
      <div class="main-content">
        <div class="header-info">
          <div class="breadcrumb">/ 系统管理 / 菜单管理</div>
          <div class="current-period">
            当期（2026 年度）住院为第 15 期，综合为第 13 期，重疾为第 12 期
          </div>
        </div>
        
        <div class="content-card">
          <div class="menu-management">
            <!-- 左侧树形菜单 -->
            <div class="menu-tree-panel">
              <div class="panel-header">
                <span class="panel-title">菜单树</span>
                <button class="add-btn" @click="handleAddRootMenu">+ 新增根菜单</button>
              </div>
              
              <el-tree
                :data="menuTree"
                :props="{ label: 'label', children: 'children' }"
                node-key="id"
                default-expand-all
                :expand-on-click-node="false"
                @node-click="handleNodeClick"
              >
                <template #default="{ node, data }">
                  <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span>{{ node.label }}</span>
                    <div class="tree-node-actions">
                      <button class="action-icon-btn" @click.stop="handleEdit(data)">编辑</button>
                      <button class="action-icon-btn" @click.stop="handleAddSubmenu(data)">+ 子</button>
                      <button class="action-icon-btn delete" @click.stop="handleDelete(data)">删除</button>
                    </div>
                  </div>
                </template>
              </el-tree>
            </div>
            
            <!-- 右侧详情表单 -->
            <div class="menu-detail-panel" v-if="selectedMenu">
              <div class="form-section">
                <h3 class="section-title">基本信息</h3>
                
                <div class="form-row">
                  <div class="form-item">
                    <label class="form-label required">菜单标题</label>
                    <el-input v-model="formData.menu_title" placeholder="请输入菜单标题"></el-input>
                  </div>
                  <div class="form-item">
                    <label class="form-label">唯一标识</label>
                    <el-input v-model="formData.unique_key" placeholder="如：accountSecurity"></el-input>
                  </div>
                </div>
                
                <div class="form-row">
                  <div class="form-item">
                    <label class="form-label required">组件名称</label>
                    <el-input v-model="formData.component" placeholder="如：accountSecurity"></el-input>
                  </div>
                  <div class="form-item">
                    <label class="form-label">路由路径</label>
                    <el-input v-model="formData.path" placeholder="如：/account/settings/security"></el-input>
                  </div>
                </div>
                
                <div class="form-row">
                  <div class="form-item">
                    <label class="form-label">重定向路径</label>
                    <el-input v-model="formData.redirect" placeholder="可选"></el-input>
                  </div>
                  <div class="form-item">
                    <label class="form-label">排序号</label>
                    <el-input-number v-model="formData.menu_no" :min="0" :max="999" style="width: 100%;"></el-input-number>
                  </div>
                </div>
                
                <div class="form-row">
                  <div class="form-item">
                    <label class="form-label">图标</label>
                    <div class="icon-selector">
                      <div class="icon-preview">{{ formData.icon || '📄' }}</div>
                      <el-input v-model="formData.icon" placeholder="输入图标或点击选择" style="flex: 1;"></el-input>
                      <el-button @click="showIconSelector = !showIconSelector">选择图标</el-button>
                    </div>
                    
                    <!-- 图标选择器 -->
                    <div v-if="showIconSelector" class="icon-grid">
                      <div 
                        v-for="icon in iconList" 
                        :key="icon"
                        class="icon-item"
                        :class="{ selected: formData.icon === icon }"
                        @click="selectIcon(icon)"
                      >{{ icon }}</div>
                    </div>
                  </div>
                  <div class="form-item">
                    <label class="form-label">显示控制</label>
                    <el-switch v-model="formData.show_flag" :active-value="'0'" :inactive-value="'1'" active-text="显示" inactive-text="隐藏"></el-switch>
                  </div>
                </div>
                
                <div class="form-row">
                  <div class="form-item">
                    <label class="form-label">搜索关键字</label>
                    <el-input v-model="formData.search_key" type="textarea" :rows="2" placeholder="用于搜索的关键字，多个用逗号分隔"></el-input>
                  </div>
                </div>
                
                <div style="margin-top: 20px; text-align: right;">
                  <el-button @click="cancelEdit">取消</el-button>
                  <el-button type="primary" @click="saveMenu">保存</el-button>
                </div>
              </div>
              
              <!-- 按钮管理 -->
              <div class="form-section">
                <h3 class="section-title">菜单按钮</h3>
                
                <table class="button-table" v-if="buttons.length > 0">
                  <thead>
                    <tr>
                      <th width="30%">按钮名称</th>
                      <th width="30%">标识</th>
                      <th width="15%">排序</th>
                      <th width="25%">操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr v-for="(btn, index) in buttons" :key="btn.MENU_BUTTON_ID || index">
                      <td>{{ btn.BUTTON_NAME }}</td>
                      <td>{{ btn.BUTTON_SIGN }}</td>
                      <td>{{ btn.BUTTON_ORDER }}</td>
                      <td>
                        <button class="table-action-btn" @click="editButton(btn)">编辑</button>
                        <button class="table-action-btn delete" @click="deleteButton(btn)">删除</button>
                      </td>
                    </tr>
                  </tbody>
                </table>
                
                <!-- 添加按钮行 -->
                <div class="add-button-row" @click="addNewButtonRow">
                  + 新增按钮
                </div>
              </div>
            </div>
            
            <!-- 空状态 -->
            <div class="empty-state" v-else>
              <div class="empty-state-icon">📋</div>
              <div class="empty-state-text">请选择一个菜单进行编辑</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 按钮编辑弹窗 -->
    <el-dialog v-model="buttonDialogVisible" :title="isEditingButton ? '编辑按钮' : '新增按钮'" width="600px">
      <div class="form-item" style="margin-bottom: 15px;">
        <label class="form-label required">按钮名称</label>
        <el-input v-model="buttonForm.button_name" placeholder="如：打印参加申请书"></el-input>
      </div>
      <div class="form-item" style="margin-bottom: 15px;">
        <label class="form-label required">标识</label>
        <el-input v-model="buttonForm.button_sign" placeholder="如：OnJobApply:pdf"></el-input>
      </div>
      <div class="form-item" style="margin-bottom: 15px;">
        <label class="form-label required">排序</label>
        <el-input-number v-model="buttonForm.button_order" :min="1" :max="999" style="width: 100%;"></el-input-number>
      </div>
      <div class="form-item" style="margin-bottom: 15px;">
        <label class="form-label">按钮 URL</label>
        <el-input v-model="buttonForm.button_url" placeholder="可选"></el-input>
      </div>
      <template #footer>
        <el-button @click="buttonDialogVisible = false">取消</el-button>
        <el-button type="primary" @click="saveButton">确定</el-button>
      </template>
    </el-dialog>
  </div>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  
  <script>
    const { createApp, ref, computed, onMounted } = Vue;
    
    const app = createApp({
      setup() {
        const menuTree = ref([]);
        const selectedMenu = ref(null);
        const formData = ref({
          menu_id: '',
          unique_key: '',
          menu_title: '',
          component: '',
          icon: '',
          path: '',
          redirect: '',
          parent_id: '0',
          show_flag: '0',
          hide_children: '',
          search_key: '',
          menu_no: 0
        });
        const buttons = ref([]);
        const showIconSelector = ref(false);
        const buttonDialogVisible = ref(false);
        const isEditingButton = ref(false);
        const currentButtonId = ref('');
        const buttonForm = ref({
          button_name: '',
          button_sign: '',
          button_order: 1,
          button_url: ''
        });
        
        // 图标列表
        const iconList = [
          '🏠', '👤', '️', '📊', '📁', '', '📝', '🔍',
          '🔒', '', '', '️', '️', '➕', '❌', '✅',
          '📢', '📅', '👥', '', '', '', '💊', '',
          '', '', '📉', '🔔', '⭐', '❤️', '', '🎯'
        ];
        
        // 加载菜单树
        const loadMenuTree = async () => {
          try {
            const response = await axios.get('/api/menus/tree');
            if (response.data.success) {
              menuTree.value = response.data.data;
            }
          } catch (err) {
            ElementPlus.ElMessage.error('加载菜单树失败：' + err.message);
          }
        };
        
        // 点击树节点
        const handleNodeClick = async (data) => {
          selectedMenu.value = data;
          formData.value = { ...data.data };
          
          // 加载该菜单的按钮
          await loadButtons(data.id);
        };
        
        // 加载按钮列表
        const loadButtons = async (menuId) => {
          try {
            const response = await axios.get(`/api/menus/${menuId}/buttons`);
            if (response.data.success) {
              buttons.value = response.data.data;
            }
          } catch (err) {
            console.error('加载按钮失败:', err);
          }
        };
        
        // 新增根菜单
        const handleAddRootMenu = () => {
          selectedMenu.value = null;
          formData.value = {
            menu_id: generateUUID(),
            unique_key: '',
            menu_title: '',
            component: '',
            icon: '',
            path: '',
            redirect: '',
            parent_id: '0',
            show_flag: '0',
            hide_children: '',
            search_key: '',
            menu_no: 0
          };
        };
        
        // 新增子菜单
        const handleAddSubmenu = (parentData) => {
          selectedMenu.value = null;
          formData.value = {
            menu_id: generateUUID(),
            unique_key: '',
            menu_title: '',
            component: '',
            icon: '',
            path: '',
            redirect: '',
            parent_id: parentData.id,
            show_flag: '0',
            hide_children: '',
            search_key: '',
            menu_no: 0
          };
        };
        
        // 编辑菜单
        const handleEdit = (data) => {
          selectedMenu.value = data;
          formData.value = { ...data.data };
        };
        
        // 删除菜单
        const handleDelete = async (data) => {
          try {
            await ElementPlus.ElMessageBox.confirm(`确定要删除菜单"${data.label}"吗？`, '提示', {
              confirmButtonText: '确定',
              cancelButtonText: '取消',
              type: 'warning'
            });
            
            const response = await axios.delete(`/api/menus/${data.id}`);
            if (response.data.success) {
              ElementPlus.ElMessage.success('删除成功');
              selectedMenu.value = null;
              await loadMenuTree();
            }
          } catch (err) {
            if (err !== 'cancel') {
              ElementPlus.ElMessage.error('删除失败：' + (err.response?.data?.message || err.message));
            }
          }
        };
        
        // 保存菜单
        const saveMenu = async () => {
          if (!formData.value.menu_title || !formData.value.component) {
            ElementPlus.ElMessage.warning('请填写必填项');
            return;
          }
          
          try {
            const url = `/api/menus/${formData.value.menu_id}`;
            const method = 'put';
            
            const response = await axios({
              method,
              url,
              data: formData.value
            });
            
            if (response.data.success) {
              ElementPlus.ElMessage.success('保存成功');
              await loadMenuTree();
            }
          } catch (err) {
            ElementPlus.ElMessage.error('保存失败：' + err.message);
          }
        };
        
        // 取消编辑
        const cancelEdit = () => {
          selectedMenu.value = null;
        };
        
        // 选择图标
        const selectIcon = (icon) => {
          formData.value.icon = icon;
          showIconSelector.value = false;
        };
        
        // 添加按钮行
        const addNewButtonRow = () => {
          isEditingButton.value = false;
          currentButtonId.value = '';
          buttonForm.value = {
            button_name: '',
            button_sign: '',
            button_order: buttons.value.length + 1,
            button_url: ''
          };
          buttonDialogVisible.value = true;
        };
        
        // 编辑按钮
        const editButton = (btn) => {
          isEditingButton.value = true;
          currentButtonId.value = btn.MENU_BUTTON_ID;
          buttonForm.value = {
            button_name: btn.BUTTON_NAME,
            button_sign: btn.BUTTON_SIGN,
            button_order: parseInt(btn.BUTTON_ORDER) || 1,
            button_url: btn.BUTTON_URL || ''
          };
          buttonDialogVisible.value = true;
        };
        
        // 删除按钮
        const deleteButton = async (btn) => {
          try {
            await ElementPlus.ElMessageBox.confirm('确定要删除这个按钮吗？', '提示', {
              confirmButtonText: '确定',
              cancelButtonText: '取消',
              type: 'warning'
            });
            
            const response = await axios.delete(`/api/menus/buttons/${btn.MENU_BUTTON_ID}`);
            if (response.data.success) {
              ElementPlus.ElMessage.success('删除成功');
              await loadButtons(selectedMenu.value.id);
            }
          } catch (err) {
            if (err !== 'cancel') {
              ElementPlus.ElMessage.error('删除失败：' + err.message);
            }
          }
        };
        
        // 保存按钮
        const saveButton = async () => {
          if (!buttonForm.value.button_name || !buttonForm.value.button_sign) {
            ElementPlus.ElMessage.warning('请填写必填项');
            return;
          }
          
          try {
            if (isEditingButton.value) {
              // 更新
              const response = await axios.put(`/api/menus/buttons/${currentButtonId.value}`, buttonForm.value);
              if (response.data.success) {
                ElementPlus.ElMessage.success('更新成功');
              }
            } else {
              // 新增
              const response = await axios.post(`/api/menus/${selectedMenu.value.id}/buttons`, buttonForm.value);
              if (response.data.success) {
                ElementPlus.ElMessage.success('添加成功');
              }
            }
            
            buttonDialogVisible.value = false;
            await loadButtons(selectedMenu.value.id);
          } catch (err) {
            ElementPlus.ElMessage.error('操作失败：' + err.message);
          }
        };
        
        // 生成 UUID
        const generateUUID = () => {
          return 'xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'.replace(/[x]/g, () => {
            const r = Math.random() * 16 | 0;
            return r.toString(16).toUpperCase();
          });
        };
        
        onMounted(() => {
          loadMenuTree();
        });
        
        return {
          menuTree,
          selectedMenu,
          formData,
          buttons,
          showIconSelector,
          iconList,
          buttonDialogVisible,
          isEditingButton,
          buttonForm,
          handleNodeClick,
          handleAddRootMenu,
          handleAddSubmenu,
          handleEdit,
          handleDelete,
          saveMenu,
          cancelEdit,
          selectIcon,
          addNewButtonRow,
          editButton,
          deleteButton,
          saveButton
        };
      }
    });
    
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
