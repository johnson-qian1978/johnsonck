# 服务器配置
server.port=8080

# 数据库配置 - Oracle
# 关键参数：oracle.jdbc.defaultNChar=true 强制 JDBC 使用 Unicode 处理所有字符数据
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/ORCL?oracle.jdbc.defaultNChar=true&oracle.jdbc.ReadTimeout=30000
spring.datasource.username=CJCMS
spring.datasource.password=1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true

# 日志配置
logging.level.com.cjcms=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.org.springframework.security=DEBUG

# Spring Security 配置 - 禁用默认的 X-Frame-Options 响应头
spring.security.headers.frame=DISABLED
