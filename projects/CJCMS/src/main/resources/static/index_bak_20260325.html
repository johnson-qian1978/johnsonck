<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>长江 CMS - SPA</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="css/themes.css">
    <style>
        body{margin:0;font-family:Arial,sans-serif}.app-container{display:flex;height:100vh;overflow:hidden}.sidebar{width:240px;background:var(--sidebar-bg,#001529);color:var(--sidebar-text,rgba(255,255,255,0.65));overflow-y:auto}.sidebar-header{height:60px;display:flex;align-items:center;justify-content:center;background:#002140;color:white;font-size:20px;font-weight:bold}.el-menu{border-right:none;background:transparent}.el-menu-item,.el-sub-menu__title{color:var(--sidebar-text,rgba(255,255,255,0.65))!important}.el-menu-item:hover,.el-sub-menu__title:hover{background-color:rgba(255,255,255,0.1)!important;color:white!important}.el-menu-item.is-active{background-color:var(--primary-color,#1890ff)!important;color:white!important}.main-container{flex:1;display:flex;flex-direction:column;overflow:hidden}.header{height:60px;background:white;box-shadow:0 1px 4px rgba(0,21,41,0.08);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:10}.header-left{display:flex;align-items:center;gap:20px}.header-right{display:flex;align-items:center;gap:15px}.content{flex:1;padding:20px;overflow-y:auto;background:var(--body-bg,#f0f2f5)}.welcome-card{background:linear-gradient(135deg,var(--primary-color,#667eea) 0%,var(--sidebar-bg,#764ba2) 100%);color:white;padding:30px;border-radius:10px;margin-bottom:20px}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:20px}.stat-card{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.stat-number{font-size:32px;font-weight:bold;color:var(--primary-color,#1890ff);margin:10px 0}.stat-label{color:#999;font-size:14px}.theme-selector{display:flex;align-items:center;gap:8px;margin-right:15px;padding:8px 15px;background:rgba(0,0,0,0.05);border-radius:25px}.theme-label{font-size:13px;color:#666;font-weight:bold}.theme-btn{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.2);transition:transform 0.2s}.theme-btn:hover{transform:scale(1.2)}.theme-btn[data-theme="theme1"]{background:linear-gradient(135deg,#1890ff 50%,#001529 50%)}.theme-btn[data-theme="theme2"]{background:linear-gradient(135deg,#6200ee 50%,#1a237e 50%)}.theme-btn[data-theme="theme3"]{background:linear-gradient(135deg,#0052d9 50%,#001f3f 50%)}.theme-btn[data-theme="theme4"]{background:linear-gradient(135deg,#00a870 50%,#003d33 50%)}.theme-btn[data-theme="theme5"]{background:linear-gradient(135deg,#d4af37 50%,#1a1a1a 50%)}.user-info{display:flex;align-items:center;gap:10px;cursor:pointer}.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary-color,#1890ff);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold}.page-container{background:white;padding:20px;border-radius:10px}.toolbar{margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
    </style>
</head>
<body>
    <div id="app"><router-view></router-view></div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        const{createApp,ref,computed,onMounted,reactive}=Vue;
        const{createRouter,createWebHashHistory}=VueRouter;

        // AppLayout Component
        const AppLayout={template:`<div class="app-container"><div class="sidebar"><div class="sidebar-header">🌊 长江 CMS</div><el-menu :default-active="activeMenu" mode="vertical" router @select="handleSelect"><template v-for="menu in menuTree" :key="menu.menuId"><el-sub-menu v-if="menu.children&&menu.children.length>0" :index="menu.menuId"><template #title><span>{{menu.menuName}}</span></template><el-menu-item v-for="child in menu.children" :key="child.menuId" :index="child.routePath">{{child.menuName}}</el-menu-item></el-sub-menu><el-menu-item v-else :index="menu.routePath">{{menu.menuName}}</el-menu-item></template></el-menu></div><div class="main-container"><div class="header"><div class="header-left"><el-breadcrumb separator="/"><el-breadcrumb-item>首页</el-breadcrumb-item><el-breadcrumb-item>{{currentTitle}}</el-breadcrumb-item></el-breadcrumb></div><div class="header-right"><div class="theme-selector"><span class="theme-label">主题:</span><div class="theme-btn" data-theme="theme1" @click="switchTheme('theme1')"></div><div class="theme-btn" data-theme="theme2" @click="switchTheme('theme2')"></div><div class="theme-btn" data-theme="theme3" @click="switchTheme('theme3')"></div><div class="theme-btn" data-theme="theme4" @click="switchTheme('theme4')"></div><div class="theme-btn" data-theme="theme5" @click="switchTheme('theme5')"></div></div><div class="user-info" @click="showUserMenu"><div class="user-avatar">{{userInitial}}</div><span>{{currentUser.realName||currentUser.username}}</span></div><el-button type="danger" size="small" @click="handleLogout">退出</el-button></div></div><div class="content"><router-view></router-view></div></div></div>`,setup(){const activeMenu=ref('/'),menuTree=ref([]),currentUser=ref({});const userInitial=computed(()=>(currentUser.value.realName||currentUser.value.username||'U').charAt(0).toUpperCase());const currentTitle=computed(()=>router.currentRoute.value.meta?.title||'控制台');const loadMenus=async()=>{try{const res=await axios.get('/api/menu/tree');if(res.data?.code===200)menuTree.value=res.data.data||[];}catch(e){console.error(e)}};const loadUserInfo=()=>{const u=localStorage.getItem('user');if(u)currentUser.value=JSON.parse(u);else window.location.href='/login.html'};const handleLogout=async()=>{try{await ElementPlus.ElMessageBox.confirm('确定退出？','提示',{type:'warning'});localStorage.removeItem('token');localStorage.removeItem('user');ElementPlus.ElMessage.success('退出成功');setTimeout(()=>window.location.href='/login.html',1000);}catch{}};const switchTheme=async(t)=>{document.documentElement.setAttribute('data-theme',t);localStorage.setItem('cjcms_theme',t);ElementPlus.ElMessage.success('主题已切换')};const showUserMenu=()=>ElementPlus.ElMessage.info('用户菜单开发中...');const handleSelect=(i)=>{activeMenu.value=i};onMounted(()=>{loadUserInfo();loadMenus();document.documentElement.setAttribute('data-theme',localStorage.getItem('cjcms_theme')||'theme1')});return{activeMenu,menuTree,currentUser,userInitial,currentTitle,handleLogout,switchTheme,showUserMenu,handleSelect}}};

        // Home Component
        const Home={template:`<div><div class="welcome-card"><h2>欢迎回来，{{currentUser.realName||currentUser.username}}！</h2><p>今天是{{currentDate}}，祝您工作愉快！</p><div class="stats-grid"><div class="stat-card"><div class="stat-label">总内容数</div><div class="stat-number">1</div></div><div class="stat-card"><div class="stat-label">待审核内容</div><div class="stat-number">0</div></div><div class="stat-card"><div class="stat-label">栏目数量</div><div class="stat-number">3</div></div><div class="stat-card"><div class="stat-label">站点数量</div><div class="stat-number">1</div></div></div></div><el-card shadow="hover"><template #header><span>快捷操作</span></template><el-row :gutter="20"><el-col :span="6"><el-button type="primary" style="width:100%" @click="ElementPlus.ElMessage.info('发布内容开发中...')">发布内容</el-button></el-col><el-col :span="6"><el-button type="success" style="width:100%" @click="ElementPlus.ElMessage.info('管理栏目开发中...')">管理栏目</el-button></el-col><el-col :span="6"><el-button type="warning" style="width:100%" @click="ElementPlus.ElMessage.info('素材管理开发中...')">素材管理</el-button></el-col><el-col :span="6"><el-button type="info" style="width:100%" @click="ElementPlus.ElMessage.info('系统设置开发中...')">系统设置</el-button></el-col></el-row></el-card></div>`,setup(){const currentUser=ref({});const currentDate=computed(()=>{const n=new Date();return`${n.getFullYear()}年${String(n.getMonth()+1).padStart(2,'0')}月${String(n.getDate()).padStart(2,'0')}日${['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][n.getDay()]}`});onMounted(()=>{const u=localStorage.getItem('user');if(u)currentUser.value=JSON.parse(u)});return{currentUser,currentDate}}};

        // AdminList Component
        const AdminList={template:`<div class="page-container"><el-card class="search-bar" shadow="hover"><el-form :inline="true" :model="searchForm"><el-form-item label="关键字"><el-input v-model="searchForm.keyword" placeholder="账号/姓名/手机" clearable style="width:180px"></el-input></el-form-item><el-form-item><el-button type="primary" icon="Search" @click="handleSearch">查询</el-button><el-button icon="Refresh" @click="handleReset">重置</el-button><el-button type="success" icon="Plus" @click="showAddDialog">新增管理员</el-button></el-form-item></el-form></el-card><el-card shadow="hover"><el-table :data="adminList" v-loading="loading" stripe><el-table-column label="头像" width="80" align="center"><template #default="{row}"><div style="width:40px;height:40px;border-radius:50%;background:var(--primary-color);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold">{{getAvatarInitial(row)}}</div></template></el-table-column><el-table-column prop="username" label="账号" width="150"></el-table-column><el-table-column prop="realName" label="姓名" width="120"></el-table-column><el-table-column prop="mobile" label="手机" width="130"></el-table-column><el-table-column prop="status" label="状态" width="80" align="center"><template #default="{row}"><el-tag :type="row.status===1?'success':'danger'">{{row.status===1?'正常':'锁定'}}</el-tag></template></el-table-column><el-table-column prop="loginCount" label="登录次数" width="100" align="center"></el-table-column><el-table-column label="角色" min-width="150"><template #default="{row}"><el-tag v-for="r in row.roles" :key="r.id" type="info" size="small" style="margin-right:5px">{{r.name}}</el-tag></template></el-table-column><el-table-column label="操作" width="340" fixed="right"><template #default="{row}"><div style="display:flex;gap:5px"><el-button size="small" type="primary" @click="showEditDialog(row)">编辑</el-button><el-button size="small" type="warning" @click="showPasswordDialog(row)">改密码</el-button><el-button size="small" :type="row.status===1?'warning':'success'" @click="handleLock(row)">{{row.status===1?'锁定':'解锁'}}</el-button><el-button size="small" type="danger" @click="handleDelete(row)">删除</el-button></div></template></el-table-column></el-table><el-pagination v-model:current-page="pagination.page" v-model:page-size="pagination.pageSize" :page-sizes="[10,20,50,100]" layout="total,sizes,prev,pager,next,jumper" :total="pagination.total" @size-change="loadData" @current-change="loadData" style="margin-top:20px;justify-content:flex-end"></el-pagination></el-card><el-dialog v-model="dialog.visible" :title="dialog.isEdit?'编辑管理员':'新增管理员'" width="500px"><el-form :model="dialog.form" label-width="80px"><el-form-item label="账号"><el-input v-model="dialog.form.username" :disabled="dialog.isEdit"/></el-form-item><el-form-item label="姓名"><el-input v-model="dialog.form.realName"/></el-form-item><el-form-item label="手机"><el-input v-model="dialog.form.mobile"/></el-form-item><el-form-item label="邮箱"><el-input v-model="dialog.form.email"/></el-form-item><el-form-item label="状态"><el-switch v-model="dialog.form.status" :active-value="1" :inactive-value="0"/></el-form-item></el-form><template #footer><el-button @click="dialog.visible=false">取消</el-button><el-button type="primary" @click="submitForm">确定</el-button></template></el-dialog><el-dialog v-model="passwordDialog.visible" title="修改密码" width="400px"><el-form :model="passwordDialog.form" label-width="80px"><el-form-item label="新密码"><el-input v-model="passwordDialog.form.newPassword" type="password"/></el-form-item><el-form-item label="确认密码"><el-input v-model="passwordDialog.form.confirmPassword" type="password"/></el-form-item></el-form><template #footer><el-button @click="passwordDialog.visible=false">取消</el-button><el-button type="primary" @click="submitPassword">确定</el-button></template></el-dialog></div>`,setup(){const loading=ref(false),searchForm=reactive({keyword:''}),adminList=ref([]),pagination=reactive({page:1,pageSize:20,total:0});const dialog=reactive({visible:false,isEdit:false,form:{username:'',realName:'',mobile:'',email:'',status:1}});const passwordDialog=reactive({visible:false,form:{newPassword:'',confirmPassword:''}});const mockData=[{adminId:'1',username:'admin',realName:'超级管理员',mobile:'13800138000',email:'admin@example.com',status:1,loginCount:100,roles:[{id:'r1',name:'超级管理员'}]},{adminId:'2',username:'editor',realName:'张三',mobile:'13900139000',email:'zhangsan@example.com',status:1,loginCount:50,roles:[{id:'r2',name:'内容编辑'}]},{adminId:'3',username:'siteadmin',realName:'李四',mobile:'13700137000',email:'lisi@example.com',status:0,loginCount:20,roles:[{id:'r3',name:'站点管理员'}]}];const getAvatarInitial=(row)=>(row.realName||row.username||'A').charAt(0).toUpperCase();const loadData=()=>{adminList.value=mockData.filter(item=>!searchForm.keyword||item.username.includes(searchForm.keyword)||item.realName.includes(searchForm.keyword)||item.mobile.includes(searchForm.keyword));pagination.total=adminList.value.length};const handleSearch=()=>{pagination.page=1;loadData()};const handleReset=()=>{searchForm.keyword='';pagination.page=1;loadData()};const showAddDialog=()=>{dialog.isEdit=false;dialog.form={username:'',realName:'',mobile:'',email:'',status:1};dialog.visible=true};const showEditDialog=(row)=>{dialog.isEdit=true;dialog.form={...row};dialog.visible=true};const submitForm=()=>{ElementPlus.ElMessage.success(dialog.isEdit?'更新成功':'新增成功');dialog.visible=false};const showPasswordDialog=(row)=>{passwordDialog.form={newPassword:'',confirmPassword:''};passwordDialog.visible=true};const submitPassword=()=>{ElementPlus.ElMessage.success('密码修改成功');passwordDialog.visible=false};const handleLock=async(row)=>{const action=row.status===1?'锁定':'解锁';await ElementPlus.ElMessageBox.confirm(`确定${action}?`,'提示',{type:'warning'});row.status=row.status===1?0:1;ElementPlus.ElMessage.success(action+'成功')};const handleDelete=async(row)=>{await ElementPlus.ElMessageBox.confirm(`确定删除 "${row.username}"?`,'警告',{type:'error'});const idx=adminList.value.findIndex(i=>i.adminId===row.adminId);if(idx>=0)adminList.value.splice(idx,1);ElementPlus.ElMessage.success('删除成功')};onMounted(()=>loadData());return{loading,searchForm,adminList,pagination,dialog,passwordDialog,getAvatarInitial,loadData,handleSearch,handleReset,showAddDialog,showEditDialog,submitForm,showPasswordDialog,submitPassword,handleLock,handleDelete}}};

        // MenuManager Component
        const MenuManager={template:`<div class="page-container"><div class="toolbar"><div><el-button type="primary" icon="Plus" @click="showAddDialog(null)">新增根菜单</el-button><el-button icon="Refresh" @click="loadData">刷新</el-button></div><el-input v-model="searchText" placeholder="搜索菜单..." style="width:200px" clearable @input="filterData"></el-input></div><el-card class="tree-container"><el-tree :data="filteredMenuList" :props="{children:'children',label:'menuName'}" node-key="menuId" default-expand-all highlight-current><template #default="{node,data}"><div style="display:flex;align-items:center;justify-content:space-between;padding:8px;border-radius:4px"><div style="display:flex;align-items:center;gap:10px"><span>{{data.icon||'📁'}}</span><el-tag size="small" :type="data.menuType===1?'warning':'info'">{{data.menuType===1?'目录':'菜单'}}</el-tag><strong>{{data.menuName}}</strong><span style="color:#999;margin-left:10px">/{{data.routePath}}</span></div><div style="display:flex;gap:5px"><el-button size="small" type="primary" @click="showAddDialog(data)">新增子菜单</el-button><el-button size="small" type="success" @click="showEditDialog(data)">编辑</el-button><el-button size="small" type="danger" @click="handleDelete(data)">删除</el-button></div></div></template></el-tree></el-card><el-dialog v-model="dialog.visible" :title="dialog.isEdit?'编辑菜单':'新增菜单'" width="500px"><el-form :model="dialog.form" label-width="80px"><el-form-item label="父级" v-if="!dialog.isRoot"><el-input :value="dialog.parentName" disabled/></el-form-item><el-form-item label="名称"><el-input v-model="dialog.form.menuName"/></el-form-item><el-form-item label="编码"><el-input v-model="dialog.form.menuCode"/></el-form-item><el-form-item label="路径"><el-input v-model="dialog.form.routePath"/></el-form-item><el-form-item label="类型"><el-radio-group v-model="dialog.form.menuType"><el-radio :label="1">目录</el-radio><el-radio :label="2">菜单</el-radio></el-radio-group></el-form-item><el-form-item label="图标"><el-input v-model="dialog.form.icon"/></el-form-item><el-form-item label="排序"><el-input-number v-model="dialog.form.orderNum" :min="0"/></el-form-item></el-form><template #footer><el-button @click="dialog.visible=false">取消</el-button><el-button type="primary" @click="submitForm">确定</el-button></template></el-dialog></div>`,setup(){const searchText=ref(''),menuList=ref([]),filteredMenuList=ref([]);const dialog=reactive({visible:false,isEdit:false,isRoot:false,parentName:'',form:{menuId:'',parentId:null,menuName:'',menuCode:'',routePath:'',menuType:2,icon:'',orderNum:0}});const mockData=[{menuId:'m1',parentId:null,menuName:'站群管理',menuCode:'site',routePath:'/site',menuType:1,icon:'🌐',orderNum:1,children:[{menuId:'m1-1',parentId:'m1',menuName:'站点列表',menuCode:'site:list',routePath:'/site/list',menuType:2,icon:'📋',orderNum:1}]},{menuId:'m2',parentId:null,menuName:'信息管理',menuCode:'content',routePath:'/content',menuType:1,icon:'📝',orderNum:2,children:[{menuId:'m2-1',parentId:'m2',menuName:'栏目管理',menuCode:'channel',routePath:'/content/channel',menuType:2,icon:'🗂️',orderNum:1}]}];const loadData=()=>{menuList.value=JSON.parse(JSON.stringify(mockData));filteredMenuList.value=menuList.value};const filterData=()=>{if(!searchText.value){filteredMenuList.value=menuList.value;return}filteredMenuList.value=menuList.value.filter(m=>m.menuName.includes(searchText.value))};const showAddDialog=(parent)=>{dialog.isEdit=false;dialog.isRoot=!parent;dialog.parentName=parent?parent.menuName:'无';dialog.form={menuId:'',parentId:parent?parent.menuId:null,menuName:'',menuCode:'',routePath:'',menuType:parent?2:1,icon:'',orderNum:0};dialog.visible=true};const showEditDialog=(data)=>{dialog.isEdit=true;dialog.form={...data};dialog.visible=true};const submitForm=()=>{ElementPlus.ElMessage.success(dialog.isEdit?'更新成功':'新增成功');dialog.visible=false};const handleDelete=async(data)=>{await ElementPlus.ElMessageBox.confirm(`确定删除 "${data.menuName}"?`,'警告',{type:'warning'});ElementPlus.ElMessage.success('删除成功')};onMounted(()=>loadData());return{searchText,filteredMenuList,dialog,loadData,filterData,showAddDialog,showEditDialog,submitForm,handleDelete}}};

        // RoleManager Component
        const RoleManager={template:`<div class="page-container"><div class="toolbar"><el-button type="primary" icon="Plus" @click="showAddDialog">新增角色</el-button><el-button icon="Refresh" @click="loadData">刷新</el-button></div><el-card shadow="hover"><el-table :data="roleList" stripe><el-table-column prop="roleId" label="角色 ID" width="120"></el-table-column><el-table-column prop="roleName" label="角色名称" width="200"></el-table-column><el-table-column prop="roleCode" label="角色编码" width="200"></el-table-column><el-table-column prop="description" label="描述" min-width="250"></el-table-column><el-table-column prop="status" label="状态" width="100"><template #default="{row}"><el-tag :type="row.status===1?'success':'danger'">{{row.status===1?'启用':'禁用'}}</el-tag></template></el-table-column><el-table-column label="操作" width="280" fixed="right"><template #default="{row}"><div style="display:flex;gap:5px"><el-button size="small" type="primary" @click="showEditDialog(row)">编辑</el-button><el-button size="small" type="warning" @click="showPermissionDialog(row)">权限</el-button><el-button size="small" :type="row.status===1?'warning':'success'" @click="toggleStatus(row)">{{row.status===1?'禁用':'启用'}}</el-button><el-button size="small" type="danger" @click="deleteRole(row)">删除</el-button></div></template></el-table-column></el-table><el-dialog v-model="dialog.visible" :title="dialog.isEdit?'编辑角色':'新增角色'" width="500px"><el-form :model="dialog.form" label-width="80px"><el-form-item label="名称"><el-input v-model="dialog.form.roleName"/></el-form-item><el-form-item label="编码"><el-input v-model="dialog.form.roleCode" :disabled="dialog.isEdit"/></el-form-item><el-form-item label="描述"><el-input v-model="dialog.form.description" type="textarea"/></el-form-item><el-form-item label="状态"><el-switch v-model="dialog.form.status" :active-value="1" :inactive-value="0"/></el-form-item></el-form><template #footer><el-button @click="dialog.visible=false">取消</el-button><el-button type="primary" @click="submitForm">确定</el-button></template></el-dialog><el-dialog v-model="permDialog.visible" title="权限分配" width="600px"><el-tree :data="menuTree" :props="{children:'children',label:'menuName'}" node-key="menuId" show-checkbox default-expand-all ref="permTreeRef"/><template #footer><el-button @click="permDialog.visible=false">取消</el-button><el-button type="primary" @click="savePermission">保存</el-button></template></el-dialog></el-card></div>`,setup(){const roleList=ref([{roleId:'role001',roleName:'超级管理员',roleCode:'super:admin',description:'拥有所有权限',status:1},{roleId:'role002',roleName:'站点管理员',roleCode:'site:admin',description:'管理站点',status:1},{roleId:'role003',roleName:'内容编辑',roleCode:'content:editor',description:'编辑内容',status:0}]);const menuTree=ref([{menuId:'m1',menuName:'站群管理',children:[{menuId:'m1-1',menuName:'站点列表'}]},{menuId:'m2',menuName:'信息管理',children:[{menuId:'m2-1',menuName:'栏目管理'}]}]);const dialog=reactive({visible:false,isEdit:false,form:{roleId:'',roleName:'',roleCode:'',description:'',status:1}});const permDialog=reactive({visible:false,roleId:''});const loadData=()=>{};const showAddDialog=()=>{dialog.isEdit=false;dialog.form={roleId:'',roleName:'',roleCode:'',description:'',status:1};dialog.visible=true};const showEditDialog=(row)=>{dialog.isEdit=true;dialog.form={...row};dialog.visible=true};const submitForm=()=>{ElementPlus.ElMessage.success(dialog.isEdit?'更新成功':'新增成功');dialog.visible=false};const showPermissionDialog=(row)=>{permDialog.roleId=row.roleId;permDialog.visible=true};const savePermission=()=>{ElementPlus.ElMessage.success('权限已保存');permDialog.visible=false};const toggleStatus=(row)=>{row.status=row.status===1?0:1;ElementPlus.ElMessage.success('状态已更新')};const deleteRole=async(row)=>{await ElementPlus.ElMessageBox.confirm('确定删除？','警告',{type:'warning'});const idx=roleList.value.findIndex(r=>r.roleId===row.roleId);if(idx>=0)roleList.value.splice(idx,1);ElementPlus.ElMessage.success('删除成功')};onMounted(()=>loadData());return{roleList,menuTree,dialog,permDialog,loadData,showAddDialog,showEditDialog,submitForm,showPermissionDialog,savePermission,toggleStatus,deleteRole}}};

        // PermissionManager Component
        const PermissionManager={template:`<div class="page-container"><el-tabs v-model="activeTab" type="border-card"><el-tab-pane label="权限点管理" name="perms"><div class="toolbar"><el-button type="primary" icon="Plus" @click="showAddPerm">新增权限</el-button><el-button icon="Refresh" @click="loadPerms">刷新</el-button></div><el-table :data="permList" stripe><el-table-column prop="permCode" label="编码" width="200"></el-table-column><el-table-column prop="permName" label="名称" width="150"></el-table-column><el-table-column prop="resourceType" label="类型" width="100"><template #default="{row}"><el-tag>{{row.resourceType}}</el-tag></template></el-table-column><el-table-column prop="resourcePath" label="路径" min-width="200"></el-table-column><el-table-column label="操作" width="150"><template #default="{row}"><el-button size="small" type="danger" @click="deletePerm(row)">删除</el-button></template></el-table-column></el-table></el-tab-pane><el-tab-pane label="角色授权" name="auth"><el-row :gutter="20"><el-col :span="8"><el-card><template #header>角色列表</template><el-tree :data="roleList" :props="{label:'roleName'}" node-key="roleId" @node-click="selectRole"/></el-card></el-col><el-col :span="16"><el-card v-if="selectedRole"><template #header><div style="display:flex;justify-content:space-between"><span>为{{selectedRole.roleName}}分配权限</span><el-button type="primary" size="small" @click="saveAuth">保存</el-button></div></template><el-tree :data="menuTree" :props="{children:'children',label:'menuName'}" node-key="menuId" show-checkbox default-expand-all/></el-card><p v-else style="padding:40px;text-align:center;color:#999">请选择一个角色进行授权</p></el-col></el-row></el-tab-pane></el-tabs><el-dialog v-model="dialog.visible" title="新增权限" width="500px"><el-form :model="dialog.form" label-width="80px"><el-form-item label="编码"><el-input v-model="dialog.form.permCode"/></el-form-item><el-form-item label="名称"><el-input v-model="dialog.form.permName"/></el-form-item><el-form-item label="类型"><el-select v-model="dialog.form.resourceType"><el-option label="菜单" value="menu"/><el-option label="按钮" value="button"/><el-option label="API" value="api"/></el-select></el-form-item><el-form-item label="路径"><el-input v-model="dialog.form.resourcePath"/></el-form-item></el-form><template #footer><el-button @click="dialog.visible=false">取消</el-button><el-button type="primary" @click="submitPerm">确定</el-button></template></el-dialog></div>`,setup(){const activeTab=ref('perms');const permList=ref([{permCode:'sys:user:add',permName:'新增用户',resourceType:'button',resourcePath:'/api/user/add'},{permCode:'sys:menu:view',permName:'查看菜单',resourceType:'menu',resourcePath:'/admin/menu'}]);const roleList=ref([{roleId:'r1',roleName:'超级管理员'},{roleId:'r2',roleName:'站点管理员'}]);const menuTree=ref([{menuId:'m1',menuName:'站群管理',children:[{menuId:'m1-1',menuName:'站点列表'}]},{menuId:'m2',menuName:'信息管理',children:[{menuId:'m2-1',menuName:'栏目管理'}]}]);const selectedRole=ref(null);const dialog=reactive({visible:false,form:{permCode:'',permName:'',resourceType:'button',resourcePath:''}});const loadPerms=()=>{};const showAddPerm=()=>{dialog.form={permCode:'',permName:'',resourceType:'button',resourcePath:''};dialog.visible=true};const submitPerm=()=>{permList.value.push({...dialog.form});ElementPlus.ElMessage.success('新增成功');dialog.visible=false};const deletePerm=async(row)=>{await ElementPlus.ElMessageBox.confirm('确定删除？','警告',{type:'warning'});const idx=permList.value.findIndex(p=>p.permCode===row.permCode);if(idx>=0)permList.value.splice(idx,1);ElementPlus.ElMessage.success('删除成功')};const selectRole=(role)=>{selectedRole.value=role};const saveAuth=()=>{ElementPlus.ElMessage.success('授权已保存')};return{activeTab,permList,roleList,menuTree,selectedRole,dialog,loadPerms,showAddPerm,submitPerm,deletePerm,selectRole,saveAuth}}};

        // Routes
        const routes=[{path:'/',component:AppLayout,name:'app',redirect:'/dashboard',children:[{path:'dashboard',component:Home,meta:{title:'控制台'}},{path:'admin/list',component:AdminList,meta:{title:'管理员列表'}},{path:'admin/menu',component:MenuManager,meta:{title:'菜单管理'}},{path:'admin/role',component:RoleManager,meta:{title:'角色管理'}},{path:'admin/permission',component:PermissionManager,meta:{title:'权限管理'}}]}];
        const router=createRouter({history:createWebHashHistory(),routes});

        // App
        const app=createApp({});
        for(const[k,c]of Object.entries(ElementPlusIconsVue))app.component(k,c);
        app.use(ElementPlus);
        app.use(router);
        app.mount('#app');
        console.log('✅ Vue SPA initialized with all modules!');
    </script>
</body>
</html>
