<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>长江 CMS - SPA</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="css/themes.css">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        .app { display: flex; height: 100vh; }
        .sidebar { width: 240px; background: var(--sidebar-bg, #001529); color: white; overflow-y: auto; }
        .sidebar-header { height: 60px; display: flex; align-items: center; justify-content: center; background: #002140; color: white; font-size: 20px; font-weight: bold; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { height: 60px; background: white; box-shadow: 0 1px 4px rgba(0,21,41,0.08); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .content { flex: 1; padding: 20px; overflow-y: auto; background: var(--body-bg, #f0f2f5); }
        .el-menu { border-right: none; background: var(--sidebar-bg, #001529); }
        
        .welcome-card { background: linear-gradient(135deg, var(--primary-color, #667eea) 0%, var(--sidebar-bg, #764ba2) 100%); color: white; padding: 30px; border-radius: 10px; margin-bottom: 20px; }
        .welcome-card h2 { margin-bottom: 10px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-number { font-size: 32px; font-weight: bold; color: var(--primary-color, #1890ff); margin: 10px 0; }
        .stat-label { color: #999; font-size: 14px; }
        
        .theme-selector { display: flex; align-items: center; gap: 8px; margin-right: 15px; padding: 8px 15px; background: rgba(0,0,0,0.05); border-radius: 25px; }
        .theme-label { font-size: 13px; color: #666; font-weight: bold; }
        .theme-btn { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2); transition: transform 0.2s; }
        .theme-btn:hover { transform: scale(1.2); }
        .theme-btn[data-theme="theme1"] { background: linear-gradient(135deg, #1890ff 50%, #001529 50%); }
        .theme-btn[data-theme="theme2"] { background: linear-gradient(135deg, #6200ee 50%, #1a237e 50%); }
        .theme-btn[data-theme="theme3"] { background: linear-gradient(135deg, #0052d9 50%, #001f3f 50%); }
        .theme-btn[data-theme="theme4"] { background: linear-gradient(135deg, #00a870 50%, #003d33 50%); }
        .theme-btn[data-theme="theme5"] { background: linear-gradient(135deg, #d4af37 50%, #1a1a1a 50%); }
        
        .user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-color, #1890ff); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        .page-container { background: white; padding: 20px; border-radius: 10px; }
        .search-bar { margin-bottom: 20px; }
        .avatar-cell { display: flex; align-items: center; justify-content: center; }
        .user-avatar-small { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-color, #1890ff); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; }
        .username-text { color: var(--primary-color, #1890ff); font-weight: 500; }
        .role-tag { margin-right: 5px; }
        .action-buttons { display: flex; gap: 5px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="app">
            <!-- 左侧菜单 -->
            <div class="sidebar">
                <div class="sidebar-header">🌊 长江 CMS</div>
                <el-menu :default-active="activeMenu" mode="vertical" router @select="handleSelect">
                    <template v-for="menu in menuTree" :key="menu.menuId">
                        <el-sub-menu v-if="menu.children && menu.children.length > 0" :index="menu.menuId">
                            <template #title><span>{{ menu.menuName }}</span></template>
                            <el-menu-item v-for="child in menu.children" :key="child.menuId" :index="child.routePath">{{ child.menuName }}</el-menu-item>
                        </el-sub-menu>
                        <el-menu-item v-else :index="menu.routePath">{{ menu.menuName }}</el-menu-item>
                    </template>
                </el-menu>
            </div>
            
            <!-- 右侧内容区 -->
            <div class="main">
                <!-- 顶部导航栏 -->
                <div class="header">
                    <div class="header-left">
                        <el-breadcrumb separator="/">
                            <el-breadcrumb-item>首页</el-breadcrumb-item>
                            <el-breadcrumb-item>{{ currentTitle }}</el-breadcrumb-item>
                        </el-breadcrumb>
                    </div>
                    <div class="header-right">
                        <div class="theme-selector">
                            <span class="theme-label">主题:</span>
                            <div class="theme-btn" data-theme="theme1" title="阿里蓝" @click="switchTheme('theme1')"></div>
                            <div class="theme-btn" data-theme="theme2" title="Material 紫" @click="switchTheme('theme2')"></div>
                            <div class="theme-btn" data-theme="theme3" title="腾讯深蓝" @click="switchTheme('theme3')"></div>
                            <div class="theme-btn" data-theme="theme4" title="清新绿" @click="switchTheme('theme4')"></div>
                            <div class="theme-btn" data-theme="theme5" title="经典黑金" @click="switchTheme('theme5')"></div>
                        </div>
                        
                        <div class="user-info" @click="showUserMenu">
                            <div class="user-avatar">{{ userInitial }}</div>
                            <span>{{ currentUser.realName || currentUser.username }}</span>
                        </div>
                        
                        <el-button type="danger" size="small" @click="handleLogout">退出</el-button>
                    </div>
                </div>
                
                <!-- 内容区 -->
                <div class="content">
                    <router-view></router-view>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <script>
        const { createApp, ref, computed, onMounted, reactive } = Vue;
        const { createRouter, createWebHashHistory } = VueRouter;

        // ============ 首页组件 ============
        const Home = {
            template: `
                <div>
                    <div class="welcome-card">
                        <h2>欢迎回来，{{ currentUser.realName || currentUser.username }}！</h2>
                        <p>今天是 {{ currentDate }}，祝您工作愉快！</p>
                        <div class="stats-grid">
                            <div class="stat-card"><div class="stat-label">总内容数</div><div class="stat-number">1</div></div>
                            <div class="stat-card"><div class="stat-label">待审核内容</div><div class="stat-number">0</div></div>
                            <div class="stat-card"><div class="stat-label">栏目数量</div><div class="stat-number">3</div></div>
                            <div class="stat-card"><div class="stat-label">站点数量</div><div class="stat-number">1</div></div>
                        </div>
                    </div>
                    <el-card shadow="hover">
                        <template #header><div class="card-header"><span>快捷操作</span></div></template>
                        <el-row :gutter="20">
                            <el-col :span="6"><el-button type="primary" icon="Plus" style="width: 100%" @click="handleQuickAction('发布内容')">发布内容</el-button></el-col>
                            <el-col :span="6"><el-button type="success" icon="FolderAdd" style="width: 100%" @click="handleQuickAction('管理栏目')">管理栏目</el-button></el-col>
                            <el-col :span="6"><el-button type="warning" icon="Picture" style="width: 100%" @click="handleQuickAction('素材管理')">素材管理</el-button></el-col>
                            <el-col :span="6"><el-button type="info" icon="Setting" style="width: 100%" @click="handleQuickAction('系统设置')">系统设置</el-button></el-col>
                        </el-row>
                    </el-card>
                </div>
            `,
            setup() {
                const currentUser = ref({});
                const currentDate = computed(() => {
                    const now = new Date();
                    const year = now.getFullYear();
                    const month = String(now.getMonth() + 1).padStart(2, '0');
                    const day = String(now.getDate()).padStart(2, '0');
                    const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
                    return `${year}年${month}月${day}日 ${weekDays[now.getDay()]}`;
                });
                const handleQuickAction = (action) => { ElementPlus.ElMessage.info(action + '功能开发中...'); };
                onMounted(() => {
                    const userStr = localStorage.getItem('user');
                    if (userStr) currentUser.value = JSON.parse(userStr);
                });
                return { currentUser, currentDate, handleQuickAction };
            }
        };

        // ============ 管理员列表组件 ============
        const AdminList = {
            template: `
                <div class="page-container">
                    <el-card class="search-bar" shadow="hover">
                        <el-form :inline="true" :model="searchForm">
                            <el-form-item label="角色">
                                <el-select v-model="searchForm.roleId" placeholder="全部角色" clearable style="width: 150px;">
                                    <el-option label="超级管理员" value="role001"></el-option>
                                    <el-option label="站点管理员" value="role002"></el-option>
                                    <el-option label="内容编辑" value="role003"></el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item label="排序">
                                <el-select v-model="searchForm.sortBy" placeholder="默认" clearable style="width: 120px;">
                                    <el-option label="按账号" value="username"></el-option>
                                    <el-option label="按姓名" value="realName"></el-option>
                                    <el-option label="按最后登录" value="lastLoginTime"></el-option>
                                    <el-option label="按登录次数" value="loginCount"></el-option>
                                </el-select>
                            </el-form-item>
                            <el-form-item label="关键字">
                                <el-input v-model="searchForm.keyword" placeholder="账号/姓名/手机" clearable style="width: 180px;"></el-input>
                            </el-form-item>
                            <el-form-item>
                                <el-button type="primary" icon="Search" @click="handleSearch">查询</el-button>
                                <el-button icon="Refresh" @click="handleReset">重置</el-button>
                            </el-form-item>
                        </el-form>
                    </el-card>

                    <el-card shadow="hover">
                        <el-table :data="adminList" v-loading="loading" stripe>
                            <el-table-column label="头像" width="80" align="center">
                                <template #default="{ row }">
                                    <div class="user-avatar-small">{{ getAvatarInitial(row) }}</div>
                                </template>
                            </el-table-column>
                            <el-table-column prop="username" label="账号" width="150">
                                <template #default="{ row }"><span class="username-text">{{ row.username }}</span></template>
                            </el-table-column>
                            <el-table-column prop="realName" label="姓名" width="120"></el-table-column>
                            <el-table-column prop="mobile" label="手机" width="130"></el-table-column>
                            <el-table-column prop="lastLoginTime" label="最后登录" width="180">
                                <template #default="{ row }">{{ formatDateTime(row.lastLoginTime) }}</template>
                            </el-table-column>
                            <el-table-column prop="loginCount" label="登录次数" width="100" align="center"></el-table-column>
                            <el-table-column label="角色" min-width="150">
                                <template #default="{ row }">
                                    <el-tag v-for="role in row.roles" :key="role.id" :type="getRoleType(role.name)" size="small" class="role-tag">{{ role.name }}</el-tag>
                                </template>
                            </el-table-column>
                            <el-table-column label="操作" width="280" fixed="right">
                                <template #default="{ row }">
                                    <div class="action-buttons">
                                        <el-button size="small" @click="handleEdit(row)">编辑</el-button>
                                        <el-button size="small" @click="handleChangePassword(row)">改密码</el-button>
                                        <el-button size="small" :type="row.status === 1 ? 'warning' : 'success'" @click="handleLock(row, row.status === 1)">{{ row.status === 1 ? '锁定' : '解锁' }}</el-button>
                                        <el-button size="small" type="danger" @click="handleDelete(row)">删除</el-button>
                                    </div>
                                </template>
                            </el-table-column>
                        </el-table>

                        <el-pagination v-model:current-page="pagination.page" v-model:page-size="pagination.pageSize"
                            :page-sizes="[10, 20, 50, 100]" layout="total, sizes, prev, pager, next, jumper"
                            :total="pagination.total" @size-change="loadAdminList" @current-change="loadAdminList"
                            style="margin-top: 20px; justify-content: flex-end;">
                        </el-pagination>
                    </el-card>
                </div>
            `,
            setup() {
                const loading = ref(false);
                const searchForm = reactive({ roleId: '', sortBy: '', keyword: '' });
                const adminList = ref([]);
                const pagination = reactive({ page: 1, pageSize: 20, total: 0 });

                const getAvatarInitial = (row) => (row.realName || row.username || 'A').charAt(0).toUpperCase();
                const formatDateTime = (dt) => dt ? new Date(dt).toLocaleString('zh-CN') : '-';
                const getRoleType = (name) => name.includes('超级') ? 'danger' : name.includes('站点') ? 'warning' : 'info';

                const loadAdminList = async () => {
                    loading.value = true;
                    try {
                        const params = new URLSearchParams({ page: pagination.page, pageSize: pagination.pageSize, ...searchForm });
                        const response = await axios.get('/api/admin/list?' + params);
                        if (response.data.code === 200) {
                            adminList.value = response.data.data?.list || [];
                            pagination.total = response.data.data?.total || 0;
                        }
                    } catch (error) {
                        console.error('Load error:', error);
                        ElementPlus.ElMessage.error('加载失败');
                    } finally { loading.value = false; }
                };

                const handleSearch = () => { pagination.page = 1; loadAdminList(); };
                const handleReset = () => { Object.assign(searchForm, { roleId: '', sortBy: '', keyword: '' }); pagination.page = 1; loadAdminList(); };
                const handleEdit = (row) => ElementPlus.ElMessage.info('编辑：' + row.username);
                const handleChangePassword = (row) => ElementPlus.ElMessage.info('改密码：' + row.username);
                const handleLock = (row, lock) => {
                    const action = lock ? '锁定' : '解锁';
                    ElementPlus.ElMessageBox.confirm(`确定要${action}吗？`, '提示', { type: 'warning' })
                        .then(() => { ElementPlus.ElMessage.success(action + '成功'); loadAdminList(); })
                        .catch(() => {});
                };
                const handleDelete = (row) => {
                    ElementPlus.ElMessageBox.confirm(`确定删除 "${row.username}"？`, '警告', { type: 'error' })
                        .then(() => { ElementPlus.ElMessage.success('删除成功'); loadAdminList(); })
                        .catch(() => {});
                };

                onMounted(() => loadAdminList());
                return { loading, searchForm, adminList, pagination, getAvatarInitial, formatDateTime, getRoleType, loadAdminList, handleSearch, handleReset, handleEdit, handleChangePassword, handleLock, handleDelete };
            }
        };

        // ============ 路由配置（动态注册） ============
        const routes = [
            { path: '/', component: Home, meta: { title: '控制台' } },
            { path: '/admin/list', component: AdminList, meta: { title: '管理员列表' } }
        ];

        const router = createRouter({ history: createWebHashHistory(), routes });

        // ============ Vue 应用 ============
        const app = createApp({
            setup() {
                const activeMenu = ref('/');
                const menuTree = ref([]);
                const currentUser = ref({});

                const userInitial = computed(() => (currentUser.value.realName || currentUser.value.username || 'U').charAt(0).toUpperCase());
                const currentTitle = computed(() => router.currentRoute.value.meta?.title || '控制台');

                const loadMenus = async () => {
                    try {
                        const response = await axios.get('/api/menu/tree');
                        if (response.data?.code === 200) {
                            menuTree.value = response.data.data || [];
                            console.log('✅ Menus loaded:', menuTree.value.length);
                            
                            // 动态注册路由
                            menuTree.value.forEach(menu => {
                                if (menu.children) {
                                    menu.children.forEach(child => {
                                        if (!router.hasRoute(child.menuCode)) {
                                            router.addRoute({
                                                path: child.routePath,
                                                name: child.menuCode,
                                                component: AdminList, // 临时使用 AdminList，后续可按需分配
                                                meta: { title: child.menuName }
                                            });
                                            console.log('✅ Route registered:', child.routePath);
                                        }
                                    });
                                }
                            });
                        }
                    } catch (error) { console.error('Menu API error:', error); }
                };

                const loadUserInfo = () => {
                    const userStr = localStorage.getItem('user');
                    if (userStr) { currentUser.value = JSON.parse(userStr); }
                    else { window.location.href = '/login.html'; }
                };

                const handleLogout = async () => {
                    try {
                        await ElementPlus.ElMessageBox.confirm('确定退出？', '提示', { type: 'warning' });
                        localStorage.removeItem('token'); localStorage.removeItem('user');
                        ElementPlus.ElMessage.success('退出成功');
                        setTimeout(() => window.location.href = '/login.html', 1000);
                    } catch {}
                };

                const switchTheme = async (themeName) => {
                    document.documentElement.setAttribute('data-theme', themeName);
                    localStorage.setItem('cjcms_theme', themeName);
                    try {
                        const user = JSON.parse(localStorage.getItem('user'));
                        if (user?.username) await axios.post('/api/auth/save-theme', { username: user.username, theme: themeName });
                    } catch (e) {}
                    const names = {theme1:'阿里蓝',theme2:'Material 紫',theme3:'腾讯深蓝',theme4:'清新绿',theme5:'经典黑金'};
                    ElementPlus.ElMessage.success('主题已切换：' + (names[themeName] || themeName));
                };

                const showUserMenu = () => ElementPlus.ElMessage.info('用户菜单开发中...');
                const handleSelect = (index) => { activeMenu.value = index; console.log('Menu:', index); };

                onMounted(() => {
                    loadUserInfo();
                    loadMenus();
                    const savedTheme = localStorage.getItem('cjcms_theme') || 'theme1';
                    document.documentElement.setAttribute('data-theme', savedTheme);
                });

                return { activeMenu, menuTree, currentUser, userInitial, currentTitle, handleLogout, switchTheme, showUserMenu, handleSelect };
            }
        });

        for (const [key, component] of Object.entries(ElementPlusIconsVue)) app.component(key, component);
        app.use(ElementPlus);
        app.use(router);
        app.mount('#app');
        console.log('✅ Vue SPA initialized with dynamic menus!');
    </script>
</body>
</html>
