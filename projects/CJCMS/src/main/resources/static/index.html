<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>й•ҝжұҹ CMS - SPA</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="css/themes.css">
    <style>
        body{margin:0;font-family:Arial,sans-serif}.app-container{display:flex;height:100vh;overflow:hidden}.sidebar{width:240px;background:var(--sidebar-bg,#001529);color:var(--sidebar-text,rgba(255,255,255,0.65));overflow-y:auto}.sidebar-header{height:60px;display:flex;align-items:center;justify-content:center;background:#002140;color:white;font-size:20px;font-weight:bold}.el-menu{border-right:none;background:transparent}.el-menu-item,.el-sub-menu__title{color:var(--sidebar-text,rgba(255,255,255,0.65))!important}.el-menu-item:hover,.el-sub-menu__title:hover{background-color:rgba(255,255,255,0.1)!important;color:white!important}.el-menu-item.is-active{background-color:var(--primary-color,#1890ff)!important;color:white!important}.main-container{flex:1;display:flex;flex-direction:column;overflow:hidden}.header{height:60px;background:white;box-shadow:0 1px 4px rgba(0,21,41,0.08);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:10}.header-left{display:flex;align-items:center;gap:20px}.header-right{display:flex;align-items:center;gap:15px}.content{flex:1;padding:20px;overflow-y:auto;background:var(--body-bg,#f0f2f5)}.welcome-card{background:linear-gradient(135deg,var(--primary-color,#667eea) 0%,var(--sidebar-bg,#764ba2) 100%);color:white;padding:30px;border-radius:10px;margin-bottom:20px}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:20px}.stat-card{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.stat-number{font-size:32px;font-weight:bold;color:var(--primary-color,#1890ff);margin:10px 0}.stat-label{color:#999;font-size:14px}.theme-selector{display:flex;align-items:center;gap:8px;margin-right:15px;padding:8px 15px;background:rgba(0,0,0,0.05);border-radius:25px}.theme-label{font-size:13px;color:#666;font-weight:bold}.theme-btn{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.2);transition:transform 0.2s}.theme-btn:hover{transform:scale(1.2)}.theme-btn[data-theme="theme1"]{background:linear-gradient(135deg,#1890ff 50%,#001529 50%)}.theme-btn[data-theme="theme2"]{background:linear-gradient(135deg,#6200ee 50%,#1a237e 50%)}.theme-btn[data-theme="theme3"]{background:linear-gradient(135deg,#0052d9 50%,#001f3f 50%)}.theme-btn[data-theme="theme4"]{background:linear-gradient(135deg,#00a870 50%,#003d33 50%)}.theme-btn[data-theme="theme5"]{background:linear-gradient(135deg,#d4af37 50%,#1a1a1a 50%)}.user-info{display:flex;align-items:center;gap:10px;cursor:pointer}.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary-color,#1890ff);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold}.page-container{background:white;padding:20px;border-radius:10px}.toolbar{margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
    </style>
</head>
<body>
    <div id="app"><router-view></router-view></div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        const{createApp,ref,computed,onMounted,reactive}=Vue;
        const{createRouter,createWebHashHistory}=VueRouter;

        // AppLayout Component
        const AppLayout={template:`<div class="app-container"><div class="sidebar"><div class="sidebar-header">рҹҢҠ й•ҝжұҹ CMS</div><el-menu :default-active="activeMenu" mode="vertical" router @select="handleSelect"><template v-for="menu in menuTree" :key="menu.menuId"><el-sub-menu v-if="menu.children&&menu.children.length>0" :index="menu.menuId"><template #title><span>{{menu.menuName}}</span></template><el-menu-item v-for="child in menu.children" :key="child.menuId" :index="child.routePath">{{child.menuName}}</el-menu-item></el-sub-menu><el-menu-item v-else :index="menu.routePath">{{menu.menuName}}</el-menu-item></template></el-menu></div><div class="main-container"><div class="header"><div class="header-left"><el-breadcrumb separator="/"><el-breadcrumb-item>йҰ–йЎө</el-breadcrumb-item><el-breadcrumb-item>{{currentTitle}}</el-breadcrumb-item></el-breadcrumb></div><div class="header-right"><div class="theme-selector"><span class="theme-label">дё»йўҳ:</span><div class="theme-btn" data-theme="theme1" @click="switchTheme('theme1')"></div><div class="theme-btn" data-theme="theme2" @click="switchTheme('theme2')"></div><div class="theme-btn" data-theme="theme3" @click="switchTheme('theme3')"></div><div class="theme-btn" data-theme="theme4" @click="switchTheme('theme4')"></div><div class="theme-btn" data-theme="theme5" @click="switchTheme('theme5')"></div></div><div class="user-info" @click="showUserMenu"><div class="user-avatar">{{userInitial}}</div><span>{{currentUser.realName||currentUser.username}}</span></div><el-button type="danger" size="small" @click="handleLogout">йҖҖеҮ?/el-button></div></div><div class="content"><router-view></router-view></div></div></div>`,setup(){const activeMenu=ref('/'),menuTree=ref([]),currentUser=ref({});const userInitial=computed(()=>(currentUser.value.realName||currentUser.value.username||'U').charAt(0).toUpperCase());const currentTitle=computed(()=>router.currentRoute.value.meta?.title||'жҺ§еҲ¶еҸ?);const loadMenus=async()=>{try{const res=await axios.get('/api/menu/tree');if(res.data?.code===200)menuTree.value=res.data.data||[];}catch(e){console.error(e)}};const loadUserInfo=()=>{const u=localStorage.getItem('user');if(u)currentUser.value=JSON.parse(u);else window.location.href='/login.html'};const handleLogout=async()=>{try{await ElementPlus.ElMessageBox.confirm('зЎ®е®ҡйҖҖеҮәпјҹ','жҸҗзӨә',{type:'warning'});localStorage.removeItem('token');localStorage.removeItem('user');ElementPlus.ElMessage.success('йҖҖеҮәжҲҗеҠ?);setTimeout(()=>window.location.href='/login.html',1000);}catch{}};const switchTheme=async(t)=>{document.documentElement.setAttribute('data-theme',t);localStorage.setItem('cjcms_theme',t);ElementPlus.ElMessage.success('дё»йўҳе·ІеҲҮжҚ?)};const showUserMenu=()=>ElementPlus.ElMessage.info('з”ЁжҲ·иҸңеҚ•ејҖеҸ‘дёӯ...');const handleSelect=(i)=>{activeMenu.value=i};onMounted(()=>{loadUserInfo();loadMenus();document.documentElement.setAttribute('data-theme',localStorage.getItem('cjcms_theme')||'theme1')});return{activeMenu,menuTree,currentUser,userInitial,currentTitle,handleLogout,switchTheme,showUserMenu,handleSelect}}};

        // Home Component
        const Home={template:`<div><div class="welcome-card"><h2>ж¬ўиҝҺеӣһжқҘпјҢ{{currentUser.realName||currentUser.username}}пј?/h2><p>д»ҠеӨ©жҳҜ{{currentDate}}пјҢзҘқжӮЁе·ҘдҪңж„үеҝ«пјҒ</p><div class="stats-grid"><div class="stat-card"><div class="stat-label">жҖ»еҶ…е®№ж•°</div><div class="stat-number">1</div></div><div class="stat-card"><div class="stat-label">еҫ…е®Ўж ёеҶ…е®?/div><div class="stat-number">0</div></div><div class="stat-card"><div class="stat-label">ж Ҹзӣ®ж•°йҮҸ</div><div class="stat-number">3</div></div><div class="stat-card"><div class="stat-label">з«ҷзӮ№ж•°йҮҸ</div><div class="stat-number">1</div></div></div></div><el-card shadow="hover"><template #header><span>еҝ«жҚ·ж“ҚдҪң</span></template><el-row :gutter="20"><el-col :span="6"><el-button type="primary" style="width:100%" @click="ElementPlus.ElMessage.info('еҸ‘еёғеҶ…е®№ејҖеҸ‘дёӯ...')">еҸ‘еёғеҶ…е®№</el-button></el-col><el-col :span="6"><el-button type="success" style="width:100%" @click="ElementPlus.ElMessage.info('з®ЎзҗҶж Ҹзӣ®ејҖеҸ‘дёӯ...')">з®ЎзҗҶж Ҹзӣ®</el-button></el-col><el-col :span="6"><el-button type="warning" style="width:100%" @click="ElementPlus.ElMessage.info('зҙ жқҗз®ЎзҗҶејҖеҸ‘дёӯ...')">зҙ жқҗз®ЎзҗҶ</el-button></el-col><el-col :span="6"><el-button type="info" style="width:100%" @click="ElementPlus.ElMessage.info('зі»з»ҹи®ҫзҪ®ејҖеҸ‘дёӯ...')">зі»з»ҹи®ҫзҪ®</el-button></el-col></el-row></el-card></div>`,setup(){const currentUser=ref({});const currentDate=computed(()=>{const n=new Date();return`${n.getFullYear()}е№?{String(n.getMonth()+1).padStart(2,'0')}жң?{String(n.getDate()).padStart(2,'0')}ж—?{['жҳҹжңҹж—?,'жҳҹжңҹдёҖ','жҳҹжңҹдә?,'жҳҹжңҹдё?,'жҳҹжңҹеӣ?,'жҳҹжңҹдә?,'жҳҹжңҹе…?][n.getDay()]}`});onMounted(()=>{const u=localStorage.getItem('user');if(u)currentUser.value=JSON.parse(u)});return{currentUser,currentDate}}};

        // AdminList Component
        const AdminList={template:`<div class="page-container"><el-card class="search-bar" shadow="hover"><el-form :inline="true" :model="searchForm"><el-form-item label="е…ій”®еӯ?><el-input v-model="searchForm.keyword" placeholder="иҙҰеҸ·/е§“еҗҚ/жүӢжңә" clearable style="width:180px"></el-input></el-form-item><el-form-item><el-button type="primary" icon="Search" @click="handleSearch">жҹҘиҜў</el-button><el-button icon="Refresh" @click="handleReset">йҮҚзҪ®</el-button><el-button type="success" icon="Plus" @click="showAddDialog">ж–°еўһз®ЎзҗҶе‘?/el-button></el-form-item></el-form></el-card><el-card shadow="hover"><el-table :data="adminList" v-loading="loading" stripe><el-table-column label="еӨҙеғҸ" width="80" align="center"><template #default="{row}"><div style="width:40px;height:40px;border-radius:50%;background:var(--primary-color);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold">{{getAvatarInitial(row)}}</div></template></el-table-column><el-table-column prop="username" label="иҙҰеҸ·" width="150"></el-table-column><el-table-column prop="realName" label="е§“еҗҚ" width="120"></el-table-column><el-table-column prop="mobile" label="жүӢжңә" width="130"></el-table-column><el-table-column prop="status" label="зҠ¶жҖ? width="80" align="center"><template #default="{row}"><el-tag :type="row.status===1?'success':'danger'">{{row.status===1?'жӯЈеёё':'й”Ғе®ҡ'}}</el-tag></template></el-table-column><el-table-column prop="loginCount" label="зҷ»еҪ•ж¬Ўж•°" width="100" align="center"></el-table-column><el-table-column label="и§’иүІ" min-width="150"><template #default="{row}"><el-tag v-for="r in row.roles" :key="r.id" type="info" size="small" style="margin-right:5px">{{r.name}}</el-tag></template></el-table-column><el-table-column label="ж“ҚдҪң" width="340" fixed="right"><template #default="{row}"><div style="display:flex;gap:5px"><el-button size="small" type="primary" @click="showEditDialog(row)">зј–иҫ‘</el-button><el-button size="small" type="warning" @click="showPasswordDialog(row)">ж”№еҜҶз ?/el-button><el-button size="small" :type="row.status===1?'warning':'success'" @click="handleLock(row)">{{row.status===1?'й”Ғе®ҡ':'и§Јй”Ғ'}}</el-button><el-button size="small" type="danger" @click="handleDelete(row)">еҲ йҷӨ</el-button></div></template></el-table-column></el-table><el-pagination v-model:current-page="pagination.page" v-model:page-size="pagination.pageSize" :page-sizes="[10,20,50,100]" layout="total,sizes,prev,pager,next,jumper" :total="pagination.total" @size-change="loadData" @current-change="loadData" style="margin-top:20px;justify-content:flex-end"></el-pagination></el-card><el-dialog v-model="dialog.visible" :title="dialog.isEdit?'зј–иҫ‘з®ЎзҗҶе‘?:'ж–°еўһз®ЎзҗҶе‘?" width="500px"><el-form :model="dialog.form" label-width="80px"><el-form-item label="иҙҰеҸ·"><el-input v-model="dialog.form.username" :disabled="dialog.isEdit"/></el-form-item><el-form-item label="е§“еҗҚ"><el-input v-model="dialog.form.realName"/></el-form-item><el-form-item label="жүӢжңә"><el-input v-model="dialog.form.mobile"/></el-form-item><el-form-item label="йӮ®з®ұ"><el-input v-model="dialog.form.email"/></el-form-item><el-form-item label="зҠ¶жҖ?><el-switch v-model="dialog.form.status" :active-value="1" :inactive-value="0"/></el-form-item></el-form><template #footer><el-button @click="dialog.visible=false">еҸ–ж¶Ҳ</el-button><el-button type="primary" @click="submitForm">зЎ®е®ҡ</el-button></template></el-dialog><el-dialog v-model="passwordDialog.visible" title="дҝ®ж”№еҜҶз Ғ" width="400px"><el-form :model="passwordDialog.form" label-width="80px"><el-form-item label="ж–°еҜҶз ?><el-input v-model="passwordDialog.form.newPassword" type="password"/></el-form-item><el-form-item label="зЎ®и®ӨеҜҶз Ғ"><el-input v-model="passwordDialog.form.confirmPassword" type="password"/></el-form-item></el-form><template #footer><el-button @click="passwordDialog.visible=false">еҸ–ж¶Ҳ</el-button><el-button type="primary" @click="submitPassword">зЎ®е®ҡ</el-button></template></el-dialog></div>`,setup(){const loading=ref(false),searchForm=reactive({keyword:''}),adminList=ref([]),pagination=reactive({page:1,pageSize:20,total:0});const dialog=reactive({visible:false,isEdit:false,form:{username:'',realName:'',mobile:'',email:'',status:1}});const passwordDialog=reactive({visible:false,form:{newPassword:'',confirmPassword:''}});const mockData=[{adminId:'1',username:'admin',realName:'и¶…зә§з®ЎзҗҶе‘?,mobile:'13800138000',email:'admin@example.com',status:1,loginCount:100,roles:[{id:'r1',name:'и¶…зә§з®ЎзҗҶе‘?}]},{adminId:'2',username:'editor',realName:'еј дёү',mobile:'13900139000',email:'zhangsan@example.com',status:1,loginCount:50,roles:[{id:'r2',name:'еҶ…е®№зј–иҫ‘'}]},{adminId:'3',username:'siteadmin',realName:'жқҺеӣӣ',mobile:'13700137000',email:'lisi@example.com',status:0,loginCount:20,roles:[{id:'r3',name:'з«ҷзӮ№з®ЎзҗҶе‘?}]}];const getAvatarInitial=(row)=>(row.realName||row.username||'A').charAt(0).toUpperCase();const loadData=()=>{adminList.value=mockData.filter(item=>!searchForm.keyword||item.username.includes(searchForm.keyword)||item.realName.includes(searchForm.keyword)||item.mobile.includes(searchForm.keyword));pagination.total=adminList.value.length};const handleSearch=()=>{pagination.page=1;loadData()};const handleReset=()=>{searchForm.keyword='';pagination.page=1;loadData()};const showAddDialog=()=>{dialog.isEdit=false;dialog.form={username:'',realName:'',mobile:'',email:'',status:1};dialog.visible=true};const showEditDialog=(row)=>{dialog.isEdit=true;dialog.form={...row};dialog.visible=true};const submitForm=()=>{ElementPlus.ElMessage.success(dialog.isEdit?'жӣҙж–°жҲҗеҠҹ':'ж–°еўһжҲҗеҠҹ');dialog.visible=false};const showPasswordDialog=(row)=>{passwordDialog.form={newPassword:'',confirmPassword:''};passwordDialog.visible=true};const submitPassword=()=>{ElementPlus.ElMessage.success('еҜҶз Ғдҝ®ж”№жҲҗеҠҹ');passwordDialog.visible=false};const handleLock=async(row)=>{const action=row.status===1?'й”Ғе®ҡ':'и§Јй”Ғ';await ElementPlus.ElMessageBox.confirm(`зЎ®е®ҡ${action}?`,'жҸҗзӨә',{type:'warning'});row.status=row.status===1?0:1;ElementPlus.ElMessage.success(action+'жҲҗеҠҹ')};const handleDelete=async(row)=>{await ElementPlus.ElMessageBox.confirm(`зЎ®е®ҡеҲ йҷӨ "${row.username}"?`,'иӯҰе‘Ҡ',{type:'error'});const idx=adminList.value.findIndex(i=>i.adminId===row.adminId);if(idx>=0)adminList.value.splice(idx,1);ElementPlus.ElMessage.success('еҲ йҷӨжҲҗеҠҹ')};onMounted(()=>loadData());return{loading,searchForm,adminList,pagination,dialog,passwordDialog,getAvatarInitial,loadData,handleSearch,handleReset,showAddDialog,showEditDialog,submitForm,showPasswordDialog,submitPassword,handleLock,handleDelete}}};

        // MenuManager Component
        const MenuManager={template:`<div class="page-container"><div class="toolbar"><div><el-button type="primary" icon="Plus" @click="showAddDialog(null)">ж–°еўһж №иҸңеҚ?/el-button><el-button icon="Refresh" @click="loadData">еҲ·ж–°</el-button></div><el-input v-model="searchText" placeholder="жҗңзҙўиҸңеҚ•..." style="width:200px" clearable @input="filterData"></el-input></div><el-card class="tree-container"><el-tree :data="filteredMenuList" :props="{children:'children',label:'menuName'}" node-key="menuId" default-expand-all highlight-current><template #default="{node,data}"><div style="display:flex;align-items:center;justify-content:space-between;padding:8px;border-radius:4px"><div style="display:flex;align-items:center;gap:10px"><span>{{data.icon||'рҹ“Ғ'}}</span><el-tag size="small" :type="data.menuType===1?'warning':'info'">{{data.menuType===1?'зӣ®еҪ•':'иҸңеҚ•'}}</el-tag><strong>{{data.menuName}}</strong><span style="color:#999;margin-left:10px">/{{data.routePath}}</span></div><div style="display:flex;gap:5px"><el-button size="small" type="primary" @click="showAddDialog(data)">ж–°еўһеӯҗиҸңеҚ?/el-button><el-button size="small" type="success" @click="showEditDialog(data)">зј–иҫ‘</el-button><el-button size="small" type="danger" @click="handleDelete(data)">еҲ йҷӨ</el-button></div></div></template></el-tree></el-card><el-dialog v-model="dialog.visible" :title="dialog.isEdit?'зј–иҫ‘иҸңеҚ•':'ж–°еўһиҸңеҚ•'" width="500px"><el-form :model="dialog.form" label-width="80px"><el-form-item label="зҲ¶зә§" v-if="!dialog.isRoot"><el-input :value="dialog.parentName" disabled/></el-form-item><el-form-item label="еҗҚз§°"><el-input v-model="dialog.form.menuName"/></el-form-item><el-form-item label="зј–з Ғ"><el-input v-model="dialog.form.menuCode"/></el-form-item><el-form-item label="и·Ҝеҫ„"><el-input v-model="dialog.form.routePath"/></el-form-item><el-form-item label="зұ»еһӢ"><el-radio-group v-model="dialog.form.menuType"><el-radio :label="1">зӣ®еҪ•</el-radio><el-radio :label="2">иҸңеҚ•</el-radio></el-radio-group></el-form-item><el-form-item label="еӣҫж Ү"><el-input v-model="dialog.form.icon"/></el-form-item><el-form-item label="жҺ’еәҸ"><el-input-number v-model="dialog.form.orderNum" :min="0"/></el-form-item></el-form><template #footer><el-button @click="dialog.visible=false">еҸ–ж¶Ҳ</el-button><el-button type="primary" @click="submitForm">зЎ®е®ҡ</el-button></template></el-dialog></div>`,setup(){const searchText=ref(''),menuList=ref([]),filteredMenuList=ref([]);const dialog=reactive({visible:false,isEdit:false,isRoot:false,parentName:'',form:{menuId:'',parentId:null,menuName:'',menuCode:'',routePath:'',menuType:2,icon:'',orderNum:0}});const mockData=[{menuId:'m1',parentId:null,menuName:'з«ҷзҫӨз®ЎзҗҶ',menuCode:'site',routePath:'/site',menuType:1,icon:'рҹҢҗ',orderNum:1,children:[{menuId:'m1-1',parentId:'m1',menuName:'з«ҷзӮ№еҲ—иЎЁ',menuCode:'site:list',routePath:'/site/list',menuType:2,icon:'рҹ“Ӣ',orderNum:1}]},{menuId:'m2',parentId:null,menuName:'дҝЎжҒҜз®ЎзҗҶ',menuCode:'content',routePath:'/content',menuType:1,icon:'рҹ“қ',orderNum:2,children:[{menuId:'m2-1',parentId:'m2',menuName:'ж Ҹзӣ®з®ЎзҗҶ',menuCode:'channel',routePath:'/content/channel',menuType:2,icon:'рҹ—Ӯпё?,orderNum:1}]}];const loadData=()=>{menuList.value=JSON.parse(JSON.stringify(mockData));filteredMenuList.value=menuList.value};const filterData=()=>{if(!searchText.value){filteredMenuList.value=menuList.value;return}filteredMenuList.value=menuList.value.filter(m=>m.menuName.includes(searchText.value))};const showAddDialog=(parent)=>{dialog.isEdit=false;dialog.isRoot=!parent;dialog.parentName=parent?parent.menuName:'ж—?;dialog.form={menuId:'',parentId:parent?parent.menuId:null,menuName:'',menuCode:'',routePath:'',menuType:parent?2:1,icon:'',orderNum:0};dialog.visible=true};const showEditDialog=(data)=>{dialog.isEdit=true;dialog.form={...data};dialog.visible=true};const submitForm=()=>{ElementPlus.ElMessage.success(dialog.isEdit?'жӣҙж–°жҲҗеҠҹ':'ж–°еўһжҲҗеҠҹ');dialog.visible=false};const handleDelete=async(data)=>{await ElementPlus.ElMessageBox.confirm(`зЎ®е®ҡеҲ йҷӨ "${data.menuName}"?`,'иӯҰе‘Ҡ',{type:'warning'});ElementPlus.ElMessage.success('еҲ йҷӨжҲҗеҠҹ')};onMounted(()=>loadData());return{searchText,filteredMenuList,dialog,loadData,filterData,showAddDialog,showEditDialog,submitForm,handleDelete}}};

        // RoleManager Component

geBox.confirm('зЎ®е®ҡеҲ йҷӨпј?,'иӯҰе‘Ҡ',{type:'warning'});const idx=roleList.value.findIndex(r=>r.roleId===row.roleId);if(idx>=0)roleList.value.splice(idx,1);ElementPlus.ElMessage.success('еҲ йҷӨжҲҗеҠҹ')};onMounted(()=>loadData());return{roleList,menuTree,dialog,permDialog,loadData,showAddDialog,showEditDialog,submitForm,showPermissionDialog,savePermission,toggleStatus,deleteRole}}};

tPerm,deletePerm,selectRole,saveAuth}}};
